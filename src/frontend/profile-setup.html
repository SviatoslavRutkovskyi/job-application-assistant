<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile — Job Application Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/frontend/style.css" />
  </head>
  <body style="display: none">
    <div id="app"></div>
    <div id="toast-container"></div>

    <script
      src="https://unpkg.com/react@18/umd/react.development.js"
      crossorigin
    ></script>
    <script
      src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"
      crossorigin
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="/frontend/auth.js"></script>

    <script type="text/babel">
      const { useState, useEffect, useRef } = React;

      // ── Utilities ─────────────────────────────────────────────────────────────
      const uid = () =>
        Math.random().toString(36).slice(2) +
        Math.random().toString(36).slice(2);

      function toast(msg, type = "info") {
        const container = document.getElementById("toast-container");
        const el = document.createElement("div");
        el.className = "toast " + type;
        el.textContent = msg;
        container.appendChild(el);
        setTimeout(() => el.remove(), 4000);
      }

      async function apiFetch(method, url, body) {
        const res = await fetch(url, {
          method,
          headers: { "Content-Type": "application/json" },
          body: body !== undefined ? JSON.stringify(body) : undefined,
        });
        if (!res.ok) {
          let detail = `Request failed (${res.status})`;
          try {
            const j = await res.json();
            detail = j.detail || detail;
          } catch {}
          throw new Error(detail);
        }
        if (res.status === 204) return null;
        return res.json();
      }

      // ── Serialization ─────────────────────────────────────────────────────────
      // _id fields are client-only (React keys). Stripped before API calls.

      function fromCandidate(data = {}) {
        return {
          profile: data.profile || "",
          education: (data.education || []).map((e) => ({ ...e, _id: uid() })),
          certificates: (data.certificates || []).map((c) => ({
            ...c,
            _id: uid(),
          })),
          skills: (data.skills || []).map((s) => ({
            _id: uid(),
            name: s.name || "",
            skills: (s.skills || []).map((sk) => ({
              _id: uid(),
              text: sk.text || "",
            })),
          })),
          experiences: (data.experiences || []).map((e) => ({
            ...e,
            _id: uid(),
            bullet_points: (e.bullet_points || []).map((b) => ({
              _id: uid(),
              text: b.text || "",
            })),
          })),
          projects: (data.projects || []).map((p) => ({
            name: p.name || "",
            date: p.date || "",
            _id: uid(),
            github_links: (p.github_links || []).map((link) => ({
              _id: uid(),
              name: link.name || "",
              url: link.url || "",
            })),
            bullet_points: (p.bullet_points || []).map((b) => ({
              _id: uid(),
              text: b.text || "",
            })),
          })),
        };
      }

      function toCandidate(state) {
        return {
          profile: state.profile,
          education: state.education.map(({ _id, ...e }) => e),
          certificates: state.certificates.map(({ _id, ...c }) => c),
          skills: state.skills.map(({ _id, name, skills }) => ({
            name,
            skills: skills.map(({ _id, text }) => ({ text })),
          })),
          experiences: state.experiences.map(
            ({ _id, bullet_points, ...e }) => ({
              ...e,
              bullet_points: bullet_points.map(({ _id, text }) => ({ text })),
            }),
          ),
          projects: state.projects.map(
            ({ _id, github_links, bullet_points, ...p }) => ({
              ...p,
              github_links: github_links.map(({ _id, ...link }) => link),
              bullet_points: bullet_points.map(({ _id, text }) => ({ text })),
            }),
          ),
        };
      }

      // ── Shared primitives ─────────────────────────────────────────────────────

      function Fg({ label, hint, children }) {
        return (
          <div className="form-group">
            {label && <label className="form-label">{label}</label>}
            {children}
            {hint && <span className="form-hint">{hint}</span>}
          </div>
        );
      }

      function EntryCard({ title, onDelete, children }) {
        return (
          <div className="entry-card">
            <div className="entry-card-header">
              <span className="entry-card-title">{title}</span>
              <button
                className="btn btn-sm btn-icon"
                onClick={onDelete}
                title="Remove"
              >
                ×
              </button>
            </div>
            {children}
          </div>
        );
      }

      function BulletList({ bullets, onAdd, onRemove, onUpdate }) {
        return (
          <Fg label="Bullet Points">
            <div className="bullet-list">
              {bullets.map((b, i) => (
                <div key={b._id} className="bullet-row">
                  <textarea
                    rows={2}
                    value={b.text}
                    onChange={(e) => onUpdate(b._id, e.target.value)}
                    placeholder={`Bullet ${i + 1}...`}
                  />
                  <button
                    className="btn btn-sm btn-icon"
                    onClick={() => onRemove(b._id)}
                  >
                    ×
                  </button>
                </div>
              ))}
              <button className="btn btn-sm" onClick={onAdd}>
                + Add Bullet
              </button>
            </div>
          </Fg>
        );
      }

      // ── Tab sections ──────────────────────────────────────────────────────────

      function PersonalSection({ data, onChange }) {
        const set = (field) => (e) =>
          onChange({ ...data, [field]: e.target.value });
        return (
          <div>
            <p className="section-desc">
              Contact information rendered in your resume header.
            </p>
            <div className="card">
              <div className="card-body">
                <div className="form-row">
                  <Fg label="Full Name *">
                    <input
                      type="text"
                      value={data.name}
                      onChange={set("name")}
                      placeholder="Your Name"
                    />
                  </Fg>
                  <Fg label="Location">
                    <input
                      type="text"
                      value={data.location || ""}
                      onChange={set("location")}
                      placeholder="City, ST"
                    />
                  </Fg>
                </div>
                <div className="form-row">
                  <Fg label="Email">
                    <input
                      type="text"
                      value={data.email || ""}
                      onChange={set("email")}
                      placeholder="you@email.com"
                    />
                  </Fg>
                  <Fg label="Phone">
                    <input
                      type="text"
                      value={data.phone || ""}
                      onChange={set("phone")}
                      placeholder="+1 (555) 000-0000"
                    />
                  </Fg>
                </div>
                <div className="form-row">
                  <Fg label="LinkedIn URL">
                    <input
                      type="text"
                      value={data.linkedin_url || ""}
                      onChange={set("linkedin_url")}
                      placeholder="https://linkedin.com/in/..."
                    />
                  </Fg>
                  <Fg
                    label="LinkedIn Label"
                    hint="Short display text shown on resume"
                  >
                    <input
                      type="text"
                      value={data.linkedin_label || ""}
                      onChange={set("linkedin_label")}
                      placeholder="linkedin.com/in/yourname"
                    />
                  </Fg>
                </div>
              </div>
            </div>
          </div>
        );
      }

      function ProfileSection({ data, onChange }) {
        return (
          <div>
            <p className="section-desc">
              A concise professional summary at the top of your resume. The AI
              rewrites this to match each role — write who you are and what you
              bring.
            </p>
            <div className="card">
              <div className="card-body">
                <Fg label="Profile Paragraph">
                  <textarea
                    rows={6}
                    value={data.profile}
                    onChange={(e) =>
                      onChange({ ...data, profile: e.target.value })
                    }
                    placeholder="Computer science graduate with experience in backend engineering and AI systems..."
                  />
                </Fg>
              </div>
            </div>
          </div>
        );
      }

      function EducationSection({ data, onChange }) {
        const add = () =>
          onChange({
            ...data,
            education: [
              ...data.education,
              {
                _id: uid(),
                institution: "",
                start_date: "",
                end_date: "",
                degree_line: "",
                location: "",
              },
            ],
          });
        const remove = (id) =>
          onChange({
            ...data,
            education: data.education.filter((e) => e._id !== id),
          });
        const update = (id, field, val) =>
          onChange({
            ...data,
            education: data.education.map((e) =>
              e._id === id ? { ...e, [field]: val } : e,
            ),
          });

        return (
          <div>
            <p className="section-desc">
              Universities, colleges, and other educational institutions. Most
              recent first.
            </p>
            {data.education.length === 0 && (
              <div className="empty-entries">No education entries yet.</div>
            )}
            {data.education.map((edu, i) => (
              <EntryCard
                key={edu._id}
                title={edu.institution || `Education ${i + 1}`}
                onDelete={() => remove(edu._id)}
              >
                <div className="form-row">
                  <Fg label="Institution">
                    <input
                      type="text"
                      value={edu.institution}
                      onChange={(e) =>
                        update(edu._id, "institution", e.target.value)
                      }
                      placeholder="University of Washington Tacoma"
                    />
                  </Fg>
                  <Fg label="Location">
                    <input
                      type="text"
                      value={edu.location}
                      onChange={(e) =>
                        update(edu._id, "location", e.target.value)
                      }
                      placeholder="Tacoma, WA"
                    />
                  </Fg>
                </div>
                <div className="form-row">
                  <Fg label="Start Date">
                    <input
                      type="text"
                      value={edu.start_date}
                      onChange={(e) =>
                        update(edu._id, "start_date", e.target.value)
                      }
                      placeholder="Sep 2022"
                    />
                  </Fg>
                  <Fg label="End Date">
                    <input
                      type="text"
                      value={edu.end_date}
                      onChange={(e) =>
                        update(edu._id, "end_date", e.target.value)
                      }
                      placeholder="Mar 2025"
                    />
                  </Fg>
                </div>
                <div className="form-row">
                  <Fg label="Degree">
                    <input
                      type="text"
                      value={edu.degree_line}
                      onChange={(e) =>
                        update(edu._id, "degree_line", e.target.value)
                      }
                      placeholder="B.S. Computer Science"
                    />
                  </Fg>
                  <Fg label="GPA" hint="Optional">
                    <input
                      type="text"
                      value={edu.gpa || ""}
                      onChange={(e) =>
                        update(edu._id, "gpa", e.target.value || null)
                      }
                      placeholder="3.90"
                    />
                  </Fg>
                </div>
              </EntryCard>
            ))}
            <button className="btn btn-sm" onClick={add}>
              + Add Education
            </button>
          </div>
        );
      }

      function CertSection({ data, onChange }) {
        const add = () =>
          onChange({
            ...data,
            certificates: [
              ...data.certificates,
              { _id: uid(), name: "", issuer: "", date: "", details: "" },
            ],
          });
        const remove = (id) =>
          onChange({
            ...data,
            certificates: data.certificates.filter((c) => c._id !== id),
          });
        const update = (id, field, val) =>
          onChange({
            ...data,
            certificates: data.certificates.map((c) =>
              c._id === id ? { ...c, [field]: val } : c,
            ),
          });

        return (
          <div>
            <p className="section-desc">
              Professional certifications and licenses.
            </p>
            {data.certificates.length === 0 && (
              <div className="empty-entries">No certificates yet.</div>
            )}
            {data.certificates.map((cert, i) => (
              <EntryCard
                key={cert._id}
                title={cert.name || `Certificate ${i + 1}`}
                onDelete={() => remove(cert._id)}
              >
                <div className="form-row">
                  <Fg label="Name">
                    <input
                      type="text"
                      value={cert.name}
                      onChange={(e) => update(cert._id, "name", e.target.value)}
                      placeholder="AZ-900: Azure Fundamentals"
                    />
                  </Fg>
                  <Fg label="Issuer">
                    <input
                      type="text"
                      value={cert.issuer || ""}
                      onChange={(e) =>
                        update(cert._id, "issuer", e.target.value)
                      }
                      placeholder="Microsoft"
                    />
                  </Fg>
                </div>
                <div className="form-row">
                  <Fg label="Date">
                    <input
                      type="text"
                      value={cert.date || ""}
                      onChange={(e) => update(cert._id, "date", e.target.value)}
                      placeholder="May 2025"
                    />
                  </Fg>
                  <Fg
                    label="Details"
                    hint="Optional — score, credential ID, etc."
                  >
                    <input
                      type="text"
                      value={cert.details || ""}
                      onChange={(e) =>
                        update(cert._id, "details", e.target.value)
                      }
                      placeholder="Score: 900/1000"
                    />
                  </Fg>
                </div>
              </EntryCard>
            ))}
            <button className="btn btn-sm" onClick={add}>
              + Add Certificate
            </button>
          </div>
        );
      }

      function SkillsSection({ data, onChange }) {
        const addCat = () =>
          onChange({
            ...data,
            skills: [...data.skills, { _id: uid(), name: "", skills: [] }],
          });
        const removeCat = (id) =>
          onChange({
            ...data,
            skills: data.skills.filter((s) => s._id !== id),
          });
        const updateName = (id, name) =>
          onChange({
            ...data,
            skills: data.skills.map((s) => (s._id === id ? { ...s, name } : s)),
          });
        const addSkill = (catId) =>
          onChange({
            ...data,
            skills: data.skills.map((s) =>
              s._id === catId
                ? { ...s, skills: [...s.skills, { _id: uid(), text: "" }] }
                : s,
            ),
          });
        const removeSkill = (catId, skillId) =>
          onChange({
            ...data,
            skills: data.skills.map((s) =>
              s._id === catId
                ? { ...s, skills: s.skills.filter((sk) => sk._id !== skillId) }
                : s,
            ),
          });
        const updateSkill = (catId, skillId, text) =>
          onChange({
            ...data,
            skills: data.skills.map((s) =>
              s._id === catId
                ? {
                    ...s,
                    skills: s.skills.map((sk) =>
                      sk._id === skillId ? { ...sk, text } : sk,
                    ),
                  }
                : s,
            ),
          });

        return (
          <div>
            <p className="section-desc">
              Organize skills into categories — each becomes a row on your
              resume. Example categories: Languages, Frameworks, Cloud &amp;
              DevOps, Tools.
            </p>
            {data.skills.length === 0 && (
              <div className="empty-entries">No skill categories yet.</div>
            )}
            {data.skills.map((cat, i) => (
              <EntryCard
                key={cat._id}
                title={cat.name || `Category ${i + 1}`}
                onDelete={() => removeCat(cat._id)}
              >
                <Fg label="Category Name">
                  <input
                    type="text"
                    value={cat.name}
                    onChange={(e) => updateName(cat._id, e.target.value)}
                    placeholder="Languages"
                  />
                </Fg>
                <Fg label="Skills">
                  <div className="skill-rows">
                    {cat.skills.map((sk) => (
                      <div key={sk._id} className="skill-row">
                        <input
                          type="text"
                          value={sk.text}
                          onChange={(e) =>
                            updateSkill(cat._id, sk._id, e.target.value)
                          }
                          placeholder="Java"
                        />
                        <button
                          className="btn btn-sm btn-icon"
                          onClick={() => removeSkill(cat._id, sk._id)}
                        >
                          ×
                        </button>
                      </div>
                    ))}
                    <button
                      className="btn btn-sm"
                      onClick={() => addSkill(cat._id)}
                    >
                      + Add Skill
                    </button>
                  </div>
                </Fg>
              </EntryCard>
            ))}
            <button className="btn btn-sm" onClick={addCat}>
              + Add Category
            </button>
          </div>
        );
      }

      function ExpSection({ data, onChange }) {
        const addExp = () =>
          onChange({
            ...data,
            experiences: [
              ...data.experiences,
              {
                _id: uid(),
                company_name: "",
                job_title: "",
                start_date: "",
                end_date: "",
                location: "",
                bullet_points: [],
              },
            ],
          });
        const removeExp = (id) =>
          onChange({
            ...data,
            experiences: data.experiences.filter((e) => e._id !== id),
          });
        const updateExp = (id, field, val) =>
          onChange({
            ...data,
            experiences: data.experiences.map((e) =>
              e._id === id ? { ...e, [field]: val } : e,
            ),
          });
        const addBullet = (expId) =>
          onChange({
            ...data,
            experiences: data.experiences.map((e) =>
              e._id === expId
                ? {
                    ...e,
                    bullet_points: [
                      ...e.bullet_points,
                      { _id: uid(), text: "" },
                    ],
                  }
                : e,
            ),
          });
        const removeBullet = (expId, bId) =>
          onChange({
            ...data,
            experiences: data.experiences.map((e) =>
              e._id === expId
                ? {
                    ...e,
                    bullet_points: e.bullet_points.filter((b) => b._id !== bId),
                  }
                : e,
            ),
          });
        const updateBullet = (expId, bId, text) =>
          onChange({
            ...data,
            experiences: data.experiences.map((e) =>
              e._id === expId
                ? {
                    ...e,
                    bullet_points: e.bullet_points.map((b) =>
                      b._id === bId ? { ...b, text } : b,
                    ),
                  }
                : e,
            ),
          });

        return (
          <div>
            <p className="section-desc">
              Work experience, internships, and other professional roles. Most
              recent first.
            </p>
            {data.experiences.length === 0 && (
              <div className="empty-entries">No experience entries yet.</div>
            )}
            {data.experiences.map((exp, i) => (
              <EntryCard
                key={exp._id}
                title={
                  exp.company_name
                    ? `${exp.company_name}${exp.job_title ? " — " + exp.job_title : ""}`
                    : `Experience ${i + 1}`
                }
                onDelete={() => removeExp(exp._id)}
              >
                <div className="form-row">
                  <Fg label="Company">
                    <input
                      type="text"
                      value={exp.company_name}
                      onChange={(e) =>
                        updateExp(exp._id, "company_name", e.target.value)
                      }
                      placeholder="Fundae"
                    />
                  </Fg>
                  <Fg label="Job Title">
                    <input
                      type="text"
                      value={exp.job_title}
                      onChange={(e) =>
                        updateExp(exp._id, "job_title", e.target.value)
                      }
                      placeholder="Software Engineering Intern"
                    />
                  </Fg>
                </div>
                <div className="form-row">
                  <Fg label="Start Date">
                    <input
                      type="text"
                      value={exp.start_date}
                      onChange={(e) =>
                        updateExp(exp._id, "start_date", e.target.value)
                      }
                      placeholder="Jun 2024"
                    />
                  </Fg>
                  <Fg label="End Date">
                    <input
                      type="text"
                      value={exp.end_date}
                      onChange={(e) =>
                        updateExp(exp._id, "end_date", e.target.value)
                      }
                      placeholder="Sep 2024"
                    />
                  </Fg>
                </div>
                <Fg label="Location">
                  <input
                    type="text"
                    value={exp.location}
                    onChange={(e) =>
                      updateExp(exp._id, "location", e.target.value)
                    }
                    placeholder="Remote"
                  />
                </Fg>
                <BulletList
                  bullets={exp.bullet_points}
                  onAdd={() => addBullet(exp._id)}
                  onRemove={(bId) => removeBullet(exp._id, bId)}
                  onUpdate={(bId, text) => updateBullet(exp._id, bId, text)}
                />
              </EntryCard>
            ))}
            <button className="btn btn-sm" onClick={addExp}>
              + Add Experience
            </button>
          </div>
        );
      }

      function ProjectsSection({ data, onChange }) {
        const addProject = () =>
          onChange({
            ...data,
            projects: [
              ...data.projects,
              {
                _id: uid(),
                name: "",
                date: "",
                github_links: [],
                bullet_points: [],
              },
            ],
          });
        const removeProject = (id) =>
          onChange({
            ...data,
            projects: data.projects.filter((p) => p._id !== id),
          });
        const updateProject = (id, field, val) =>
          onChange({
            ...data,
            projects: data.projects.map((p) =>
              p._id === id ? { ...p, [field]: val } : p,
            ),
          });
        const addLink = (projId) =>
          onChange({
            ...data,
            projects: data.projects.map((p) =>
              p._id === projId
                ? {
                    ...p,
                    github_links: [
                      ...p.github_links,
                      { _id: uid(), name: "", url: "" },
                    ],
                  }
                : p,
            ),
          });
        const removeLink = (projId, linkId) =>
          onChange({
            ...data,
            projects: data.projects.map((p) =>
              p._id === projId
                ? {
                    ...p,
                    github_links: p.github_links.filter(
                      (l) => l._id !== linkId,
                    ),
                  }
                : p,
            ),
          });
        const updateLink = (projId, linkId, field, val) =>
          onChange({
            ...data,
            projects: data.projects.map((p) =>
              p._id === projId
                ? {
                    ...p,
                    github_links: p.github_links.map((l) =>
                      l._id === linkId ? { ...l, [field]: val } : l,
                    ),
                  }
                : p,
            ),
          });
        const addBullet = (projId) =>
          onChange({
            ...data,
            projects: data.projects.map((p) =>
              p._id === projId
                ? {
                    ...p,
                    bullet_points: [
                      ...p.bullet_points,
                      { _id: uid(), text: "" },
                    ],
                  }
                : p,
            ),
          });
        const removeBullet = (projId, bId) =>
          onChange({
            ...data,
            projects: data.projects.map((p) =>
              p._id === projId
                ? {
                    ...p,
                    bullet_points: p.bullet_points.filter((b) => b._id !== bId),
                  }
                : p,
            ),
          });
        const updateBullet = (projId, bId, text) =>
          onChange({
            ...data,
            projects: data.projects.map((p) =>
              p._id === projId
                ? {
                    ...p,
                    bullet_points: p.bullet_points.map((b) =>
                      b._id === bId ? { ...b, text } : b,
                    ),
                  }
                : p,
            ),
          });

        return (
          <div>
            <p className="section-desc">
              Personal and academic projects. Most relevant first.
            </p>
            {data.projects.length === 0 && (
              <div className="empty-entries">No projects yet.</div>
            )}
            {data.projects.map((proj, i) => (
              <EntryCard
                key={proj._id}
                title={proj.name || `Project ${i + 1}`}
                onDelete={() => removeProject(proj._id)}
              >
                <div className="form-row">
                  <Fg label="Project Name">
                    <input
                      type="text"
                      value={proj.name}
                      onChange={(e) =>
                        updateProject(proj._id, "name", e.target.value)
                      }
                      placeholder="Resume & Cover Letter Assistant"
                    />
                  </Fg>
                  <Fg label="Date">
                    <input
                      type="text"
                      value={proj.date}
                      onChange={(e) =>
                        updateProject(proj._id, "date", e.target.value)
                      }
                      placeholder="Jan 2025 — Present"
                    />
                  </Fg>
                </div>
                <Fg
                  label="GitHub Links"
                  hint="Optional — label and URL for each repository"
                >
                  <div className="repo-rows">
                    {proj.github_links.map((link) => (
                      <div key={link._id} className="repo-row">
                        <input
                          type="text"
                          value={link.name}
                          onChange={(e) =>
                            updateLink(
                              proj._id,
                              link._id,
                              "name",
                              e.target.value,
                            )
                          }
                          placeholder="Label (e.g. GitHub)"
                        />
                        <input
                          type="text"
                          value={link.url}
                          onChange={(e) =>
                            updateLink(
                              proj._id,
                              link._id,
                              "url",
                              e.target.value,
                            )
                          }
                          placeholder="https://github.com/..."
                        />
                        <button
                          className="btn btn-sm btn-icon"
                          onClick={() => removeLink(proj._id, link._id)}
                        >
                          ×
                        </button>
                      </div>
                    ))}
                    <button
                      className="btn btn-sm"
                      onClick={() => addLink(proj._id)}
                    >
                      + Add Link
                    </button>
                  </div>
                </Fg>
                <BulletList
                  bullets={proj.bullet_points}
                  onAdd={() => addBullet(proj._id)}
                  onRemove={(bId) => removeBullet(proj._id, bId)}
                  onUpdate={(bId, text) => updateBullet(proj._id, bId, text)}
                />
              </EntryCard>
            ))}
            <button className="btn btn-sm" onClick={addProject}>
              + Add Project
            </button>
          </div>
        );
      }

      function SummarySection({ data, onChange }) {
        const add = () =>
          onChange({
            topics: [...data.topics, { _id: uid(), topic: "", response: "" }],
          });
        const remove = (id) =>
          onChange({ topics: data.topics.filter((t) => t._id !== id) });
        const update = (id, field, val) =>
          onChange({
            topics: data.topics.map((t) =>
              t._id === id ? { ...t, [field]: val } : t,
            ),
          });

        return (
          <div>
            <p className="section-desc">
              Narrative context used when answering open-ended application
              questions. Write responses as you'd say them — the AI answers in
              your voice. Suggested topics: origin, career_direction, why_ai,
              differentiators, problem_solving, weaknesses.
            </p>
            {data.topics.length === 0 && (
              <div className="empty-entries">No topics yet.</div>
            )}
            {data.topics.map((t, i) => (
              <EntryCard
                key={t._id}
                title={t.topic || `Topic ${i + 1}`}
                onDelete={() => remove(t._id)}
              >
                <Fg label="Topic Name">
                  <input
                    type="text"
                    value={t.topic}
                    onChange={(e) => update(t._id, "topic", e.target.value)}
                    placeholder="career_direction"
                  />
                </Fg>
                <Fg label="Your Response">
                  <textarea
                    rows={5}
                    value={t.response}
                    onChange={(e) => update(t._id, "response", e.target.value)}
                    placeholder="Write in first person, honest and specific..."
                  />
                </Fg>
              </EntryCard>
            ))}
            <button className="btn btn-sm" onClick={add}>
              + Add Topic
            </button>
          </div>
        );
      }

      // ── Tab config ────────────────────────────────────────────────────────────

      const TAB_ORDER = [
        "personal",
        "profile",
        "education",
        "certificates",
        "skills",
        "experience",
        "projects",
        "summary",
      ];
      const TAB_LABELS = {
        personal: "Personal",
        profile: "Profile",
        education: "Education",
        certificates: "Certificates",
        skills: "Skills",
        experience: "Experience",
        projects: "Projects",
        summary: "Summary",
      };

      // ── Main App ──────────────────────────────────────────────────────────────

      const BLANK_PERSONAL = {
        name: "",
        location: "",
        phone: "",
        email: "",
        linkedin_url: "",
        linkedin_label: "",
      };
      const BLANK_CANDIDATE = {
        profile: "",
        education: [],
        certificates: [],
        skills: [],
        experiences: [],
        projects: [],
      };
      const BLANK_SUMMARY = { topics: [] };

      function App() {
        const [tab, setTab] = useState("personal");
        const [personal, setPersonal] = useState(BLANK_PERSONAL);
        const [candidate, setCandidate] = useState(BLANK_CANDIDATE);
        const [summary, setSummary] = useState(BLANK_SUMMARY);
        const [loading, setLoading] = useState(true);
        const [saving, setSaving] = useState(false);

        // Ref keeps save() from closing over stale state
        const snap = useRef({ personal, candidate, summary, tab });
        useEffect(() => {
          snap.current = { personal, candidate, summary, tab };
        }, [personal, candidate, summary, tab]);

        useEffect(() => {
          init();
        }, []);

        async function init() {
          await requireAuth();
          document.body.style.display = "";
          try {
            const data = await apiFetch("GET", "/api/v1/profile");
            if (data?.personal)
              setPersonal({ ...BLANK_PERSONAL, ...data.personal });
            if (data?.candidate) setCandidate(fromCandidate(data.candidate));
            if (data?.personal_summary) {
              const raw = data.personal_summary;
              setSummary({
                topics: (raw.topics || []).map((t) => ({ ...t, _id: uid() })),
              });
            }
          } catch (e) {
            if (!e.message.includes("404"))
              toast("Could not load profile: " + e.message, "error");
          }
          setLoading(false);
        }

        async function save() {
          if (saving) return;
          const {
            personal: p,
            candidate: c,
            summary: s,
            tab: t,
          } = snap.current;
          setSaving(true);
          try {
            if (t === "personal") {
              await apiFetch("PUT", "/api/v1/profile/personal", p);
            } else if (t === "summary") {
              await apiFetch("PUT", "/api/v1/profile/personal-summary", {
                topics: s.topics.map(({ _id, ...rest }) => rest),
              });
            } else {
              await apiFetch(
                "PUT",
                "/api/v1/profile/candidate",
                toCandidate(c),
              );
            }
            toast("Saved", "success");
          } catch (e) {
            toast("Save failed: " + e.message, "error");
          } finally {
            setSaving(false);
          }
        }

        function switchTab(newTab) {
          save().catch(console.error); // optimistic: switch immediately, save in background
          setTab(newTab);
        }

        async function saveAndContinue() {
          await save();
          const idx = TAB_ORDER.indexOf(tab);
          if (idx < TAB_ORDER.length - 1) {
            setTab(TAB_ORDER[idx + 1]);
          } else {
            window.location.href = "/";
          }
        }

        function badge(t) {
          const n = {
            education: candidate.education.length,
            certificates: candidate.certificates.length,
            skills: candidate.skills.length,
            experience: candidate.experiences.length,
            projects: candidate.projects.length,
            summary: summary.topics.length,
          }[t];
          return n ? <span className="tab-badge">{n}</span> : null;
        }

        function renderSection() {
          switch (tab) {
            case "personal":
              return <PersonalSection data={personal} onChange={setPersonal} />;
            case "profile":
              return (
                <ProfileSection data={candidate} onChange={setCandidate} />
              );
            case "education":
              return (
                <EducationSection data={candidate} onChange={setCandidate} />
              );
            case "certificates":
              return <CertSection data={candidate} onChange={setCandidate} />;
            case "skills":
              return <SkillsSection data={candidate} onChange={setCandidate} />;
            case "experience":
              return <ExpSection data={candidate} onChange={setCandidate} />;
            case "projects":
              return (
                <ProjectsSection data={candidate} onChange={setCandidate} />
              );
            case "summary":
              return <SummarySection data={summary} onChange={setSummary} />;
          }
        }

        return (
          <>
            <header>
              <span className="header-title">job-application-assistant</span>
              <div style={{ display: "flex", gap: "8px" }}>
                <a className="btn btn-sm" href="/">
                  ← Back to App
                </a>
                <a
                  className="btn btn-sm"
                  href="/.auth/logout?post_logout_redirect_uri=/frontend/landing.html"
                >
                  Sign Out
                </a>
              </div>
            </header>

            <div className="tab-bar">
              {TAB_ORDER.map((t) => (
                <button
                  key={t}
                  className={"tab" + (tab === t ? " active" : "")}
                  onClick={() => switchTab(t)}
                  disabled={saving}
                >
                  {TAB_LABELS[t]}
                  {badge(t)}
                </button>
              ))}
            </div>

            <main className="profile-main">
              {loading ? (
                <div className="empty-state">Loading profile...</div>
              ) : (
                renderSection()
              )}
            </main>

            <div className="profile-footer">
              <span className="saving-indicator">
                {saving ? "Saving..." : ""}
              </span>
              <div className="profile-footer-right">
                <button
                  className="btn"
                  onClick={save}
                  disabled={saving || loading}
                >
                  Save
                </button>
                <button
                  className="btn btn-primary"
                  onClick={saveAndContinue}
                  disabled={saving || loading}
                >
                  {tab === TAB_ORDER[TAB_ORDER.length - 1]
                    ? "Save & Finish"
                    : "Save & Continue →"}
                </button>
              </div>
            </div>
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById("app")).render(<App />);
    </script>
  </body>
</html>
