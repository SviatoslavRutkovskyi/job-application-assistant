<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile — Job Application Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/frontend/style.css" />
    <style>
      /* Fix 6: prevent white flash before React mounts */
      #app {
        background: var(--bg);
        min-height: 100vh;
      }
    </style>
  </head>
  <body style="display: none">
    <div id="app"></div>
    <div id="toast-container"></div>

    <script
      src="https://unpkg.com/react@18/umd/react.development.js"
      crossorigin
    ></script>
    <script
      src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"
      crossorigin
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="/frontend/auth.js"></script>

    <script type="text/babel">
      const { useState, useEffect, useRef } = React;

      // ── Utilities ─────────────────────────────────────────────────────────────
      const uid = () =>
        Math.random().toString(36).slice(2) +
        Math.random().toString(36).slice(2);

      function toast(msg, type = "info") {
        const container = document.getElementById("toast-container");
        const el = document.createElement("div");
        el.className = "toast " + type;
        el.textContent = msg;
        container.appendChild(el);
        setTimeout(() => el.remove(), 4000);
      }

      async function apiFetch(method, url, body) {
        const res = await fetch(url, {
          method,
          headers: { "Content-Type": "application/json" },
          body: body !== undefined ? JSON.stringify(body) : undefined,
        });
        if (!res.ok) {
          let detail = `Request failed (${res.status})`;
          try {
            const j = await res.json();
            detail = j.detail || detail;
          } catch {}
          throw new Error(detail);
        }
        if (res.status === 204) return null;
        return res.json();
      }

      // ── Date helpers ──────────────────────────────────────────────────────────
      const MONTHS = [
        "Jan",
        "Feb",
        "Mar",
        "Apr",
        "May",
        "Jun",
        "Jul",
        "Aug",
        "Sep",
        "Oct",
        "Nov",
        "Dec",
      ];

      function toMonthInput(str) {
        if (!str || str === "Present") return "";
        const parts = str.trim().split(" ");
        if (parts.length !== 2) return "";
        const idx = MONTHS.indexOf(parts[0]);
        if (idx === -1 || !parts[1]) return "";
        return `${parts[1]}-${String(idx + 1).padStart(2, "0")}`;
      }

      function fromMonthInput(val) {
        if (!val) return "";
        const [year, month] = val.split("-");
        return `${MONTHS[parseInt(month, 10) - 1]} ${year}`;
      }

      function displayRange(start, end, isCurrent) {
        const s = start ? fromMonthInput(start) : "";
        const e = isCurrent ? "Present" : end ? fromMonthInput(end) : "";
        return [s, e].filter(Boolean).join(" – ");
      }

      // ── Serialization ─────────────────────────────────────────────────────────
      function fromCandidate(data = {}) {
        return {
          profile: data.profile || "",
          education: (data.education || []).map((e) => ({
            ...e,
            _id: uid(),
            start_date: toMonthInput(e.start_date),
            end_date: e.end_date === "Present" ? "" : toMonthInput(e.end_date),
            is_current: e.end_date === "Present",
          })),
          certificates: (data.certificates || []).map((c) => ({
            ...c,
            _id: uid(),
            date: toMonthInput(c.date),
          })),
          skills: (data.skills || []).map((s) => ({
            _id: uid(),
            name: s.name || "",
            skills: (s.skills || []).map((sk) => ({
              _id: uid(),
              text: sk.text || "",
            })),
          })),
          experience: (data.experience || []).map((e) => ({
            ...e,
            _id: uid(),
            is_current: e.end_date === "Present",
            start_date: toMonthInput(e.start_date),
            end_date: e.end_date === "Present" ? "" : toMonthInput(e.end_date),
            bullet_points: (e.bullet_points || []).map((b) => ({
              _id: uid(),
              text: b.text || "",
            })),
          })),
          projects: (data.projects || []).map((p) => ({
            name: p.name || "",
            _id: uid(),
            date: toMonthInput(p.date),
            github_links: (p.github_links || []).map((l) => ({
              _id: uid(),
              name: l.name || "",
              url: l.url || "",
            })),
            bullet_points: (p.bullet_points || []).map((b) => ({
              _id: uid(),
              text: b.text || "",
            })),
          })),
        };
      }

      function toCandidate(state) {
        return {
          profile: state.profile,
          education: state.education.map(
            ({ _id, is_current, start_date, end_date, ...e }) => ({
              ...e,
              start_date: fromMonthInput(start_date),
              end_date: is_current ? "Present" : fromMonthInput(end_date),
            }),
          ),
          certificates: state.certificates.map(({ _id, date, ...c }) => ({
            ...c,
            date: fromMonthInput(date),
          })),
          skills: state.skills.map(({ _id, name, skills }) => ({
            name,
            skills: skills.map(({ _id, text }) => ({ text })),
          })),
          experience: state.experience.map(
            ({
              _id,
              is_current,
              start_date,
              end_date,
              bullet_points,
              ...e
            }) => ({
              ...e,
              start_date: fromMonthInput(start_date),
              end_date: is_current ? "Present" : fromMonthInput(end_date),
              bullet_points: bullet_points.map(({ _id, text }) => ({ text })),
            }),
          ),
          projects: state.projects.map(
            ({ _id, date, github_links, bullet_points, ...p }) => ({
              ...p,
              date: fromMonthInput(date),
              github_links: github_links.map(({ _id, ...l }) => l),
              bullet_points: bullet_points.map(({ _id, text }) => ({ text })),
            }),
          ),
        };
      }

      // ── Shared primitives ─────────────────────────────────────────────────────

      function Fg({ label, hint, children }) {
        return (
          <div className="form-group">
            {label && <label className="form-label">{label}</label>}
            {children}
            {hint && <span className="form-hint">{hint}</span>}
          </div>
        );
      }

      // Fix 5: EntryCard is now controlled — parent owns which entry is editing.
      // editingId / onEdit(id) / onDone() passed from section.
      function EntryCard({
        id,
        editingId,
        onEdit,
        onDone,
        viewContent,
        onDelete,
        children,
      }) {
        const isEditing = editingId === id;
        return (
          <div className="entry-card">
            {isEditing ? (
              <div>
                {children}
                <div className="entry-edit-footer">
                  <button className="btn btn-sm" onClick={onDelete}>
                    Remove
                  </button>
                  <button className="btn btn-sm btn-primary" onClick={onDone}>
                    Done
                  </button>
                </div>
              </div>
            ) : (
              <div className="entry-view">
                <div className="entry-view-info">{viewContent}</div>
                <div className="entry-view-actions">
                  <button className="btn btn-sm" onClick={() => onEdit(id)}>
                    Edit
                  </button>
                  <button
                    className="btn btn-sm btn-icon"
                    onClick={onDelete}
                    title="Remove"
                  >
                    ×
                  </button>
                </div>
              </div>
            )}
          </div>
        );
      }

      // Fix 4 (bullet ×): flex row — textarea takes flex:1, button stays inline
      function BulletList({ bullets, onAdd, onRemove, onUpdate }) {
        return (
          <Fg label="Bullet Points">
            <div className="bullet-list">
              {bullets.map((b, i) => (
                <div key={b._id} className="bullet-row">
                  <textarea
                    rows={2}
                    value={b.text}
                    onChange={(e) => onUpdate(b._id, e.target.value)}
                    placeholder={`Achievement or responsibility ${i + 1}...`}
                  />
                  <button
                    className="btn btn-sm btn-icon"
                    onClick={() => onRemove(b._id)}
                    title="Remove"
                  >
                    ×
                  </button>
                </div>
              ))}
              <button
                className="btn btn-sm"
                style={{ alignSelf: "flex-start" }}
                onClick={onAdd}
              >
                + Add Bullet
              </button>
            </div>
          </Fg>
        );
      }

      // Fix 3: Backspace-to-delete removed entirely. Only × removes chips.
      function ChipInput({ skills, onChange }) {
        const [input, setInput] = useState("");
        const addSkill = () => {
          const val = input.trim().replace(/,$/, "");
          if (!val) return;
          if (!skills.find((s) => s.text.toLowerCase() === val.toLowerCase())) {
            onChange([...skills, { _id: uid(), text: val }]);
          }
          setInput("");
        };
        return (
          <div
            className="chip-container"
            onClick={(e) =>
              e.currentTarget.querySelector(".chip-input")?.focus()
            }
          >
            {skills.map((sk) => (
              <span key={sk._id} className="skill-chip">
                {sk.text}
                <button
                  type="button"
                  className="chip-remove"
                  onClick={(e) => {
                    e.stopPropagation();
                    onChange(skills.filter((s) => s._id !== sk._id));
                  }}
                >
                  ×
                </button>
              </span>
            ))}
            <input
              className="chip-input"
              type="text"
              value={input}
              onChange={(e) => setInput(e.target.value)}
              onKeyDown={(e) => {
                if (e.key === "Enter" || e.key === ",") {
                  e.preventDefault();
                  addSkill();
                }
              }}
              onBlur={addSkill}
              placeholder={
                skills.length === 0 ? "Type a skill, press Enter to add..." : ""
              }
            />
          </div>
        );
      }

      function EndDateField({
        value,
        isCurrent,
        onDateChange,
        onCurrentChange,
        label = "End Date",
      }) {
        return (
          <Fg label={label}>
            <input
              type="month"
              value={value || ""}
              onChange={(e) => onDateChange(e.target.value)}
              disabled={isCurrent}
            />
            <label className="checkbox-label current-checkbox">
              <input
                type="checkbox"
                checked={isCurrent || false}
                onChange={(e) => onCurrentChange(e.target.checked)}
              />
              Present
            </label>
          </Fg>
        );
      }

      // Fix 2: Skill view — "CategoryName: skill1, skill2, skill3"
      function SkillViewRow({ name, skills }) {
        return (
          <div className="entry-view-skill-row">
            <span className="entry-view-title">
              {name || "Unnamed category"}
            </span>
            {skills.length > 0 && (
              <span className="entry-view-skill-list">
                : {skills.map((s) => s.text).join(", ")}
              </span>
            )}
          </div>
        );
      }

      // ── Tab sections ──────────────────────────────────────────────────────────

      function PersonalSection({ data, onChange, editing, onEdit, onDone }) {
        const set = (field) => (e) =>
          onChange({ ...data, [field]: e.target.value });
        return (
          <div>
            <p className="section-desc">
              Contact information rendered in your resume header.
            </p>
            <div className="card">
              <div className="card-header">
                <span>Personal Info</span>
                {editing ? (
                  <button className="btn btn-sm btn-primary" onClick={onDone}>
                    Done
                  </button>
                ) : (
                  <button className="btn btn-sm" onClick={onEdit}>
                    Edit
                  </button>
                )}
              </div>
              <div className={`card-body${editing ? "" : " section-locked"}`}>
                <div className="form-row">
                  <Fg
                    label="Full Name *"
                    hint="Required — unlocks all other sections"
                  >
                    <input
                      type="text"
                      value={editing ? data.name : data.name || "—"}
                      onChange={set("name")}
                      placeholder={editing ? "Full Name" : ""}
                      disabled={!editing}
                    />
                  </Fg>
                  <Fg label="Location">
                    <input
                      type="text"
                      value={
                        editing ? data.location || "" : data.location || "—"
                      }
                      onChange={set("location")}
                      placeholder={editing ? "City, ST" : ""}
                      disabled={!editing}
                    />
                  </Fg>
                </div>
                <div className="form-row">
                  <Fg label="Email">
                    <input
                      type="text"
                      value={editing ? data.email || "" : data.email || "—"}
                      onChange={set("email")}
                      placeholder={editing ? "your@email.com" : ""}
                      disabled={!editing}
                    />
                  </Fg>
                  <Fg label="Phone">
                    <input
                      type="text"
                      value={editing ? data.phone || "" : data.phone || "—"}
                      onChange={set("phone")}
                      placeholder={editing ? "+1 (555) 000-0000" : ""}
                      disabled={!editing}
                    />
                  </Fg>
                </div>
                <div className="form-row">
                  <Fg label="LinkedIn URL">
                    <input
                      type="text"
                      value={
                        editing
                          ? data.linkedin_url || ""
                          : data.linkedin_url || "—"
                      }
                      onChange={set("linkedin_url")}
                      placeholder={
                        editing ? "https://linkedin.com/in/handle" : ""
                      }
                      disabled={!editing}
                    />
                  </Fg>
                  <Fg
                    label="LinkedIn Label"
                    hint="Short display text shown on resume"
                  >
                    <input
                      type="text"
                      value={
                        editing
                          ? data.linkedin_label || ""
                          : data.linkedin_label || "—"
                      }
                      onChange={set("linkedin_label")}
                      placeholder={editing ? "linkedin.com/in/handle" : ""}
                      disabled={!editing}
                    />
                  </Fg>
                </div>
              </div>
            </div>
          </div>
        );
      }

      function ProfileSection({ data, onChange, editing, onEdit, onDone }) {
        return (
          <div>
            <p className="section-desc">
              A concise professional summary at the top of your resume. The AI
              rewrites this for each role — write who you are and what you
              bring.
            </p>
            <div className="card">
              <div className="card-header">
                <span>Profile Summary</span>
                {editing ? (
                  <button className="btn btn-sm btn-primary" onClick={onDone}>
                    Done
                  </button>
                ) : (
                  <button className="btn btn-sm" onClick={onEdit}>
                    Edit
                  </button>
                )}
              </div>
              <div className={`card-body${editing ? "" : " section-locked"}`}>
                <Fg label="Profile Paragraph">
                  <textarea
                    rows={6}
                    value={editing ? data.profile : data.profile || "—"}
                    onChange={(e) =>
                      onChange({ ...data, profile: e.target.value })
                    }
                    placeholder={
                      editing
                        ? "Software engineer with X years of experience in..."
                        : ""
                    }
                    disabled={!editing}
                  />
                </Fg>
              </div>
            </div>
          </div>
        );
      }

      function EducationSection({ data, onChange, onSave }) {
        const [editingId, setEditingId] = useState(null);

        const handleEdit = (id) => {
          if (editingId !== null && editingId !== id) onSave(data);
          setEditingId(id);
        };
        const add = () => {
          const newId = uid();
          const newData = {
            ...data,
            education: [
              ...data.education,
              {
                _id: newId,
                institution: "",
                start_date: "",
                end_date: "",
                is_current: false,
                degree_line: "",
                gpa: null,
                location: "",
              },
            ],
          };
          onChange(newData);
          setEditingId(newId);
        };
        const remove = (id) => {
          const newData = {
            ...data,
            education: data.education.filter((e) => e._id !== id),
          };
          onChange(newData);
          if (editingId === id) setEditingId(null);
          onSave(newData);
        };
        const update = (id, field, val) =>
          onChange({
            ...data,
            education: data.education.map((e) =>
              e._id === id ? { ...e, [field]: val } : e,
            ),
          });

        return (
          <div>
            <p className="section-desc">
              Universities, colleges, and other educational institutions.
            </p>
            {data.education.length === 0 && (
              <div className="empty-entries">No education entries yet.</div>
            )}
            {data.education.map((edu) => (
              <EntryCard
                key={edu._id}
                id={edu._id}
                editingId={editingId}
                onEdit={handleEdit}
                onDone={() => {
                  setEditingId(null);
                  onSave(data);
                }}
                onDelete={() => remove(edu._id)}
                viewContent={
                  <div>
                    <div className="entry-view-title">
                      {edu.institution || "Unnamed institution"}
                    </div>
                    <div className="entry-view-sub">
                      {edu.degree_line}
                      {edu.gpa ? ` | GPA: ${edu.gpa}` : ""}
                    </div>
                    <div className="entry-view-sub">
                      {displayRange(
                        edu.start_date,
                        edu.end_date,
                        edu.is_current,
                      )}
                      {edu.location ? ` · ${edu.location}` : ""}
                    </div>
                  </div>
                }
              >
                <div className="form-row">
                  <Fg label="Institution">
                    <input
                      type="text"
                      value={edu.institution}
                      onChange={(e) =>
                        update(edu._id, "institution", e.target.value)
                      }
                      placeholder="University Name"
                    />
                  </Fg>
                  <Fg label="Location">
                    <input
                      type="text"
                      value={edu.location}
                      onChange={(e) =>
                        update(edu._id, "location", e.target.value)
                      }
                      placeholder="City, ST"
                    />
                  </Fg>
                </div>
                <div className="form-row">
                  <Fg label="Start Date">
                    <input
                      type="month"
                      value={edu.start_date}
                      onChange={(e) =>
                        update(edu._id, "start_date", e.target.value)
                      }
                    />
                  </Fg>
                  <EndDateField
                    value={edu.end_date}
                    isCurrent={edu.is_current}
                    onDateChange={(v) => update(edu._id, "end_date", v)}
                    onCurrentChange={(v) => update(edu._id, "is_current", v)}
                  />
                </div>
                <div className="form-row">
                  <Fg label="Degree">
                    <input
                      type="text"
                      value={edu.degree_line}
                      onChange={(e) =>
                        update(edu._id, "degree_line", e.target.value)
                      }
                      placeholder="B.S. Computer Science"
                    />
                  </Fg>
                  <Fg label="GPA" hint="Optional">
                    <input
                      type="text"
                      value={edu.gpa || ""}
                      onChange={(e) =>
                        update(edu._id, "gpa", e.target.value || null)
                      }
                      placeholder="3.90"
                    />
                  </Fg>
                </div>
              </EntryCard>
            ))}
            <button className="btn btn-sm" onClick={add}>
              + Add Education
            </button>
          </div>
        );
      }

      function ExpSection({ data, onChange, onSave }) {
        const [editingId, setEditingId] = useState(null);

        const handleEdit = (id) => {
          if (editingId !== null && editingId !== id) onSave(data);
          setEditingId(id);
        };
        const addExp = () => {
          const newId = uid();
          onChange({
            ...data,
            experience: [
              ...data.experience,
              {
                _id: newId,
                company_name: "",
                job_title: "",
                start_date: "",
                end_date: "",
                is_current: false,
                location: "",
                bullet_points: [],
              },
            ],
          });
          setEditingId(newId);
        };
        const removeExp = (id) => {
          const newData = {
            ...data,
            experience: data.experience.filter((e) => e._id !== id),
          };
          onChange(newData);
          if (editingId === id) setEditingId(null);
          onSave(newData);
        };
        const updateExp = (id, field, val) =>
          onChange({
            ...data,
            experience: data.experience.map((e) =>
              e._id === id ? { ...e, [field]: val } : e,
            ),
          });
        const addBullet = (expId) =>
          onChange({
            ...data,
            experience: data.experience.map((e) =>
              e._id === expId
                ? {
                    ...e,
                    bullet_points: [
                      ...e.bullet_points,
                      { _id: uid(), text: "" },
                    ],
                  }
                : e,
            ),
          });
        const removeBullet = (expId, bId) =>
          onChange({
            ...data,
            experience: data.experience.map((e) =>
              e._id === expId
                ? {
                    ...e,
                    bullet_points: e.bullet_points.filter((b) => b._id !== bId),
                  }
                : e,
            ),
          });
        const updateBullet = (expId, bId, text) =>
          onChange({
            ...data,
            experience: data.experience.map((e) =>
              e._id === expId
                ? {
                    ...e,
                    bullet_points: e.bullet_points.map((b) =>
                      b._id === bId ? { ...b, text } : b,
                    ),
                  }
                : e,
            ),
          });

        return (
          <div>
            <p className="section-desc">
              Work experience, internships, and other professional roles.
            </p>
            {data.experience.length === 0 && (
              <div className="empty-entries">No experience entries yet.</div>
            )}
            {data.experience.map((exp) => (
              <EntryCard
                key={exp._id}
                id={exp._id}
                editingId={editingId}
                onEdit={handleEdit}
                onDone={() => {
                  setEditingId(null);
                  onSave(data);
                }}
                onDelete={() => removeExp(exp._id)}
                viewContent={
                  <div>
                    <div className="entry-view-title">
                      {exp.company_name || "Unnamed company"}
                      {exp.job_title ? ` — ${exp.job_title}` : ""}
                    </div>
                    <div className="entry-view-sub">
                      {displayRange(
                        exp.start_date,
                        exp.end_date,
                        exp.is_current,
                      )}
                      {exp.location ? ` · ${exp.location}` : ""}
                    </div>
                    {exp.bullet_points.length > 0 && (
                      <div className="entry-view-sub">
                        {exp.bullet_points.length} bullet
                        {exp.bullet_points.length !== 1 ? "s" : ""}
                      </div>
                    )}
                  </div>
                }
              >
                <div className="form-row">
                  <Fg label="Company">
                    <input
                      type="text"
                      value={exp.company_name}
                      onChange={(e) =>
                        updateExp(exp._id, "company_name", e.target.value)
                      }
                      placeholder="Company Name"
                    />
                  </Fg>
                  <Fg label="Job Title">
                    <input
                      type="text"
                      value={exp.job_title}
                      onChange={(e) =>
                        updateExp(exp._id, "job_title", e.target.value)
                      }
                      placeholder="Software Engineer"
                    />
                  </Fg>
                </div>
                <div className="form-row">
                  <Fg label="Start Date">
                    <input
                      type="month"
                      value={exp.start_date}
                      onChange={(e) =>
                        updateExp(exp._id, "start_date", e.target.value)
                      }
                    />
                  </Fg>
                  <EndDateField
                    value={exp.end_date}
                    isCurrent={exp.is_current}
                    onDateChange={(v) => updateExp(exp._id, "end_date", v)}
                    onCurrentChange={(v) => updateExp(exp._id, "is_current", v)}
                  />
                </div>
                <Fg label="Location">
                  <input
                    type="text"
                    value={exp.location}
                    onChange={(e) =>
                      updateExp(exp._id, "location", e.target.value)
                    }
                    placeholder="City, ST or Remote"
                  />
                </Fg>
                <BulletList
                  bullets={exp.bullet_points}

      // ── Resume Settings tab ───────────────────────────────────────────────────
      // ── Section validation ────────────────────────────────────────────────────
      // Each key is a tab name. The function receives that tab's data and returns
      // an array of error strings (empty = valid). Adding a required field to any
      // section means adding one entry here — enforcement is automatic everywhere.
      const SECTION_VALIDATORS = {
        personal: (data) => (data.name.trim() ? [] : ["Name is required."]),
      };

      // Returns the data object relevant to a given tab.
      function getTabData(tabName, { personal, candidate, summary, layout }) {
        if (tabName === "personal") return personal;
        if (tabName === "summary") return summary;
        if (tabName === "resume_settings") return layout;
        return candidate;
      }

      // Runs the validator for tabName (if any) and returns an array of error strings.
      function validateTab(tabName, allData) {
        const validator = SECTION_VALIDATORS[tabName];
        return validator ? validator(getTabData(tabName, allData)) : [];
      }

      const SECTION_LABELS = {
        profile: "Profile Summary",
        education: "Education",
        experience: "Experience",
        projects: "Projects",
        skills: "Technical Skills",
        certificates: "Certifications",
      };
      const DEFAULT_LAYOUT_ORDER = [
        "profile",
        "education",
        "experience",
        "projects",
        "skills",
        "certificates",
      ];

      function ProgressBar({ lines, minLines }) {
        const pct = minLines > 0 ? (lines / minLines) * 100 : 0;
        const tier = Math.floor(pct / 100);
        const overflowPct = pct % 100;
        // tier 0=red, 1=green, 2=blue, 3+=yellow
        const colors = [
          "var(--danger)",
          "var(--accent)",
          "#3b82f6",
          "var(--warn)",
        ];
        const baseColor = colors[Math.min(tier, 3)];
        const nextColor = colors[Math.min(tier + 1, 3)];
        return (
          <div
            style={{
              display: "flex",
              alignItems: "center",
              gap: "8px",
              marginLeft: "auto",
              paddingLeft: "16px",
              paddingRight: "8px",
            }}
          >
            <div
              style={{
                position: "relative",
                width: "140px",
                height: "6px",
                background: "var(--border)",
                borderRadius: "99px",
                flexShrink: 0,
              }}
            >
              {tier >= 1 && (
                <div
                  style={{
                    position: "absolute",
                    inset: 0,
                    background: baseColor,
                    borderRadius: "99px",
                  }}
                />
              )}
              <div
                style={{
                  position: "absolute",
                  left: 0,
                  top: 0,
                  bottom: 0,
                  width: (tier === 0 ? Math.min(pct, 100) : overflowPct) + "%",
                  background: tier === 0 ? baseColor : nextColor,
                  borderRadius: "99px",
                  transition: "width 0.4s ease, background 0.4s ease",
                }}
              />
            </div>
            <span
              style={{
                fontFamily: "var(--mono)",
                fontSize: "11px",
                color: "var(--text-2)",
                flexShrink: 0,
              }}
            >
              {Math.round(pct)}%
            </span>
          </div>
        );
      }

      function ResumeSettingsSection({ data, onChange }) {
        const [exporting, setExporting] = React.useState(false);
        const order = data;
        const inactive = DEFAULT_LAYOUT_ORDER.filter((s) => !order.includes(s));

        function move(idx, dir) {
          const next = [...order];
          const swap = idx + dir;
          if (swap < 0 || swap >= next.length) return;
          [next[idx], next[swap]] = [next[swap], next[idx]];
          onChange(next);
        }

        function remove(section) {
          onChange(order.filter((s) => s !== section));
        }

        function add(section) {
          onChange([...order, section]);
        }

        async function exportResume() {
          setExporting(true);
          try {
            const result = await apiFetch("POST", "/api/v1/resume/export");
            const res = await fetch(
              "/api/v1/resume/download/" + result.pdf_url,
            );
            if (!res.ok) throw new Error("Download failed");
            const blob = await res.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "resume.pdf";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            toast("Resume downloaded.", "success");
          } catch (e) {
            toast("Export failed: " + e.message, "error");
          } finally {
            setExporting(false);
          }
        }

        return (
          <div className="section-wrap">
            <p className="section-desc">
              Set the order sections appear on your resume, then download a full
              version of your profile as a PDF.
            </p>

            <div className="entry-card" style={{ marginBottom: "24px" }}>
              <h3
                style={{
                  marginBottom: "12px",
                  fontSize: "13px",
                  textTransform: "uppercase",
                  letterSpacing: "0.05em",
                  color: "var(--fg-muted)",
                }}
              >
                Section Order
              </h3>
              {order.map((section, idx) => (
                <div
                  key={section}
                  style={{
                    display: "flex",
                    alignItems: "center",
                    gap: "8px",
                    padding: "8px 0",
                    borderBottom: "1px solid var(--border)",
                  }}
                >
                  <span style={{ flex: 1, fontSize: "14px" }}>
                    {SECTION_LABELS[section] || section}
                  </span>
                  <button
                    className="btn btn-sm"
                    onClick={() => move(idx, -1)}
                    disabled={idx === 0}
                    style={{ padding: "2px 8px", minWidth: "28px" }}
                    title="Move up"
                  >
                    ↑
                  </button>
                  <button
                    className="btn btn-sm"
                    onClick={() => move(idx, 1)}
                    disabled={idx === order.length - 1}
                    style={{ padding: "2px 8px", minWidth: "28px" }}
                    title="Move down"
                  >
                    ↓
                  </button>
                  <button
                    className="btn btn-sm"
                    onClick={() => remove(section)}
                    style={{
                      padding: "2px 8px",
                      minWidth: "28px",
                      color: "var(--fg-muted)",
                    }}
                    title="Remove section"
                  >
                    ×
                  </button>
                </div>
              ))}

              {inactive.length > 0 && (
                <div style={{ marginTop: "8px" }}>
                  {inactive.map((section) => (
                    <div
                      key={section}
                      style={{
                        display: "flex",
                        alignItems: "center",
                        gap: "8px",
                        padding: "8px 0",
                        borderBottom: "1px solid var(--border)",
                        opacity: 0.45,
                      }}
                    >
                      <span style={{ flex: 1, fontSize: "14px" }}>
                        {SECTION_LABELS[section] || section}
                      </span>
                      <button
                        className="btn btn-sm"
                        onClick={() => add(section)}
                        style={{ padding: "2px 8px" }}
                        title="Add section"
                      >
                        + Add
                      </button>
                    </div>
                  ))}
                </div>
              )}
            </div>

            <button
              className="btn btn-primary"
              onClick={exportResume}
              disabled={exporting}
            >
              {exporting ? "Generating…" : "⬇ Download Full Resume"}
            </button>
          </div>
        );
      }

      // ── Tab config ────────────────────────────────────────────────────────────
      const TAB_ORDER = [
        "personal",
        "profile",
        "education",
        "experience",
        "projects",
        "skills",
        "certificates",
        "summary",
        "resume_settings",
      ];
      const TAB_LABELS = {
        personal: "Personal",
        profile: "Profile",
        education: "Education",
        experience: "Experience",
        projects: "Projects",
        skills: "Skills",
        certificates: "Certificates",
        summary: "Q&A",
        resume_settings: "Resume Settings",
      };

      // ── Main App ──────────────────────────────────────────────────────────────
      const BLANK_PERSONAL = {
        name: "",
        location: "",
        phone: "",
        email: "",
        linkedin_url: "",
        linkedin_label: "",
      };
      const BLANK_CANDIDATE = {
        profile: "",
        education: [],
        certificates: [],
        skills: [],
        experience: [],
        projects: [],
      };
      const BLANK_SUMMARY = { topics: [] };

      function App() {
        const [tab, setTab] = useState("personal");
        const [personal, setPersonal] = useState(BLANK_PERSONAL);
        const [candidate, setCandidate] = useState(BLANK_CANDIDATE);
        const [summary, setSummary] = useState(BLANK_SUMMARY);
        const [layout, setLayout] = useState(DEFAULT_LAYOUT_ORDER);
        const [loading, setLoading] = useState(true);
        const [saving, setSaving] = useState(false);
        const [lineCount, setLineCount] = useState({ lines: 0, min_lines: 53 });
        const [personalEditing, setPersonalEditing] = useState(false);
        const [profileEditing, setProfileEditing] = useState(false);

        const snap = useRef({
          personal,
          candidate,
          summary,
          layout,
          tab,
          loading,
        });
        useEffect(() => {
          snap.current = { personal, candidate, summary, layout, tab, loading };
        }, [personal, candidate, summary, layout, tab, loading]);
        useEffect(() => {
          init();
        }, []);

        async function refreshLineCount() {
          try {
            const data = await apiFetch("GET", "/api/v1/profile/line-count");
            if (data) setLineCount(data);
          } catch (e) {
            /* non-fatal */
          }
        }

        // ── Save helpers ──────────────────────────────────────────────────────

        async function saveCandidateData(data, silent = false) {
          await apiFetch("PUT", "/api/v1/profile/candidate", toCandidate(data));
          if (!silent) toast("Saved", "success");
          refreshLineCount();
        }

        async function savePersonalData(data, silent = false) {
          await apiFetch("PUT", "/api/v1/profile/personal", data);
          if (!silent) toast("Saved", "success");
        }

        async function saveSummaryData(data, silent = false) {
          await apiFetch("PUT", "/api/v1/profile/personal-summary", {
            topics: data.topics.map(({ _id, ...rest }) => rest),
          });
          if (!silent) toast("Saved", "success");
        }

        async function saveLayoutData(data) {
          await apiFetch("PUT", "/api/v1/profile/layout", {
            section_order: data,
          });
        }

        // Silently commit the current tab before navigation. Guards against loading state.
        async function commitCurrent() {
          const {
            tab: t,
            personal: p,
            candidate: c,
            summary: s,
            layout: l,
            loading: isLoading,
          } = snap.current;
          if (isLoading) return;
          if (
            validateTab(t, { personal: p, candidate: c, summary: s, layout: l })
              .length > 0
          )
            return;
          try {
            if (t === "personal") await savePersonalData(p, true);
            else if (t === "summary") await saveSummaryData(s, true);
            else if (t === "resume_settings") await saveLayoutData(l);
            else await saveCandidateData(c, true);
          } catch (e) {
            toast("Save failed: " + e.message, "error");
          }
        }

        async function init() {
          await requireAuth();
          document.body.style.display = "";
          try {
            const data = await apiFetch("GET", "/api/v1/profile");
            if (data?.personal)
              setPersonal({ ...BLANK_PERSONAL, ...data.personal });
            if (data?.candidate) setCandidate(fromCandidate(data.candidate));
            if (data?.personal_summary) {
              const raw = data.personal_summary;
              setSummary({
                topics: (raw.topics || []).map((t) => ({ ...t, _id: uid() })),
              });
            }
            // Auto-open personal edit if name is empty (new user)
            if (!data?.personal?.name?.trim()) setPersonalEditing(true);
          } catch (e) {
            if (!e.message.includes("404"))
              toast("Could not load profile: " + e.message, "error");
            setPersonalEditing(true);
          }
          try {
            const layoutData = await apiFetch("GET", "/api/v1/profile/layout");
            if (layoutData?.section_order) setLayout(layoutData.section_order);
          } catch (e) {
            /* non-fatal */
          }
          setLoading(false);
          refreshLineCount();
        }

        function switchTab(newTab) {
          commitCurrent().catch(console.error);
          setPersonalEditing(false);
          setProfileEditing(false);
          setTab(newTab);
        }

        async function goNext() {
          const {
            tab: t,
            personal: p,
            candidate: c,
            summary: s,
            layout: l,
          } = snap.current;
          const errors = validateTab(t, {
            personal: p,
            candidate: c,
            summary: s,
            layout: l,
          });
          if (errors.length > 0) {
            errors.forEach((msg) => toast(msg, "error"));
            return;
          }
          try {
            await commitCurrent();
            const idx = TAB_ORDER.indexOf(snap.current.tab);
            if (idx < TAB_ORDER.length - 1) setTab(TAB_ORDER[idx + 1]);
            else window.location.href = "/";
          } finally {
            setSaving(false);
          }
        }

        async function goPrev() {
          setSaving(true);
          try {
            await commitCurrent();
            const idx = TAB_ORDER.indexOf(snap.current.tab);
            if (idx > 0) setTab(TAB_ORDER[idx - 1]);
          } finally {
            setSaving(false);
          }
        }

        function badge(t) {
          const counts = {
            education: candidate.education.length,
            certificates: candidate.certificates.length,
            skills: candidate.skills.length,
            experience: candidate.experience.length,
            projects: candidate.projects.length,
            summary: summary.topics.length,
          };
          const n = counts[t];
          return n ? <span className="tab-badge">{n}</span> : null;
        }

        const tabEnabled = (t) =>
          t === "personal" ||
          validateTab("personal", { personal, candidate, summary, layout })
            .length === 0;

        function renderSection() {
          const saveCand = (d) =>
            saveCandidateData(d, false).catch((e) =>
              toast("Save failed: " + e.message, "error"),
            );
          const saveSum = (d) =>
            saveSummaryData(d, false).catch((e) =>
              toast("Save failed: " + e.message, "error"),
            );
          switch (tab) {
            case "personal":
              return (
                <PersonalSection
                  data={personal}
                  onChange={setPersonal}
                  editing={personalEditing}
                  onEdit={() => setPersonalEditing(true)}
                  onDone={() => {
                    const errors = validateTab("personal", {
                      personal,
                      candidate,
                      summary,
                      layout,
                    });
                    if (errors.length > 0) {
                      errors.forEach((msg) => toast(msg, "error"));
                      return;
                    }
                    setPersonalEditing(false);
                    savePersonalData(personal, false).catch((e) =>
                      toast("Save failed: " + e.message, "error"),
                    );
                  }}
                />
              );
            case "profile":
              return (
                <ProfileSection
                  data={candidate}
                  onChange={setCandidate}
                  editing={profileEditing}
                  onEdit={() => setProfileEditing(true)}
                  onDone={() => {
                    setProfileEditing(false);
                    saveCandidateData(candidate, false).catch((e) =>
                      toast("Save failed: " + e.message, "error"),
                    );
                  }}
                />
              );
            case "education":
              return (
                <EducationSection
                  data={candidate}
                  onChange={setCandidate}
                  onSave={saveCand}
                />
              );
            case "experience":
              return (
                <ExpSection
                  data={candidate}
                  onChange={setCandidate}
                  onSave={saveCand}
                />
              );
            case "projects":
              return (
                <ProjectsSection
                  data={candidate}
                  onChange={setCandidate}
                  onSave={saveCand}
                />
              );
            case "skills":
              return (
                <SkillsSection
                  data={candidate}
                  onChange={setCandidate}
                  onSave={saveCand}
                />
              );
            case "certificates":
              return (
                <CertSection
                  data={candidate}
                  onChange={setCandidate}
                  onSave={saveCand}
                />
              );
            case "summary":
              return (
                <SummarySection
                  data={summary}
                  onChange={setSummary}
                  onSave={saveSum}
                />
              );
            case "resume_settings":
              return (
                <ResumeSettingsSection data={layout} onChange={setLayout} />
              );
          }
        }

        const tabIdx = TAB_ORDER.indexOf(tab);
        const isFirst = tabIdx === 0;
        const isLast = tabIdx === TAB_ORDER.length - 1;

        return (
          <>
            <header>
              <span className="header-title">job-application-assistant</span>
              <div style={{ display: "flex", gap: "8px" }}>
                <button
                  className="btn btn-sm"
                  onClick={async () => {
                    await commitCurrent();
                    window.location.href = "/";
                  }}
                >
                  &larr; Back to App
                </button>
                <button className="btn btn-sm" onClick={() => signOut()}>
                  Sign Out
                </button>
              </div>
            </header>

            <div className="tab-bar">
              {TAB_ORDER.map((t) => (
                <button
                  key={t}
                  className={"tab" + (tab === t ? " active" : "")}
                  onClick={() => switchTab(t)}
                  disabled={saving || !tabEnabled(t)}
                >
                  {TAB_LABELS[t]}
                  {badge(t)}
                </button>
              ))}
              <ProgressBar
                lines={lineCount.lines}
                minLines={lineCount.min_lines}
              />
            </div>

            <main className="profile-main">
              <div className="profile-nav-bar">
                {!isFirst && (
                  <button
                    className="btn btn-sm"
                    onClick={goPrev}
                    disabled={saving || loading}
                  >
                    &larr; Prev
                  </button>
                )}
                <button
                  className="btn btn-sm btn-primary"
                  onClick={goNext}
                  disabled={saving || loading}
                >
                  {isLast ? "Finish" : "Next \u2192"}
                </button>
              </div>

              {loading ? (
                <div className="empty-state">Loading profile...</div>
              ) : (
                renderSection()
              )}
            </main>
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById("app")).render(<App />);
    </script>
  </body>
</html>
