<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile — Job Application Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/frontend/style.css" />
    <style>
      /* Fix 6: prevent white flash before React mounts */
      #app {
        background: var(--bg);
        min-height: 100vh;
      }
    </style>
  </head>
  <body style="display: none">
    <div id="app"></div>
    <div id="toast-container"></div>

    <script
      src="https://unpkg.com/react@18/umd/react.development.js"
      crossorigin
    ></script>
    <script
      src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"
      crossorigin
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="/frontend/auth.js"></script>

    <script type="text/babel">
      const { useState, useEffect, useRef } = React;

      // ── Utilities ─────────────────────────────────────────────────────────────
      const uid = () =>
        Math.random().toString(36).slice(2) +
        Math.random().toString(36).slice(2);

      function toast(msg, type = "info") {
        const container = document.getElementById("toast-container");
        const el = document.createElement("div");
        el.className = "toast " + type;
        el.textContent = msg;
        container.appendChild(el);
        setTimeout(() => el.remove(), 4000);
      }

      async function apiFetch(method, url, body) {
        const res = await fetch(url, {
          method,
          headers: { "Content-Type": "application/json" },
          body: body !== undefined ? JSON.stringify(body) : undefined,
        });
        if (!res.ok) {
          let detail = `Request failed (${res.status})`;
          try {
            const j = await res.json();
            detail = j.detail || detail;
          } catch {}
          throw new Error(detail);
        }
        if (res.status === 204) return null;
        return res.json();
      }

      // ── Date helpers ──────────────────────────────────────────────────────────
      const MONTHS = [
        "Jan",
        "Feb",
        "Mar",
        "Apr",
        "May",
        "Jun",
        "Jul",
        "Aug",
        "Sep",
        "Oct",
        "Nov",
        "Dec",
      ];

      function toMonthInput(str) {
        if (!str || str === "Present") return "";
        const parts = str.trim().split(" ");
        if (parts.length !== 2) return "";
        const idx = MONTHS.indexOf(parts[0]);
        if (idx === -1 || !parts[1]) return "";
        return `${parts[1]}-${String(idx + 1).padStart(2, "0")}`;
      }

      function fromMonthInput(val) {
        if (!val) return "";
        const [year, month] = val.split("-");
        return `${MONTHS[parseInt(month, 10) - 1]} ${year}`;
      }

      function displayRange(start, end, isCurrent) {
        const s = start ? fromMonthInput(start) : "";
        const e = isCurrent ? "Present" : end ? fromMonthInput(end) : "";
        return [s, e].filter(Boolean).join(" – ");
      }

      // ── Serialization ─────────────────────────────────────────────────────────
      function fromCandidate(data = {}) {
        return {
          profile: data.profile || "",
          education: (data.education || []).map((e) => ({
            ...e,
            _id: uid(),
            start_date: toMonthInput(e.start_date),
            end_date: e.end_date === "Present" ? "" : toMonthInput(e.end_date),
            is_current: e.end_date === "Present",
          })),
          certificates: (data.certificates || []).map((c) => ({
            ...c,
            _id: uid(),
            date: toMonthInput(c.date),
          })),
          skills: (data.skills || []).map((s) => ({
            _id: uid(),
            name: s.name || "",
            skills: (s.skills || []).map((sk) => ({
              _id: uid(),
              text: sk.text || "",
            })),
          })),
          experiences: (data.experiences || []).map((e) => ({
            ...e,
            _id: uid(),
            is_current: e.end_date === "Present",
            start_date: toMonthInput(e.start_date),
            end_date: e.end_date === "Present" ? "" : toMonthInput(e.end_date),
            bullet_points: (e.bullet_points || []).map((b) => ({
              _id: uid(),
              text: b.text || "",
            })),
          })),
          projects: (data.projects || []).map((p) => ({
            name: p.name || "",
            _id: uid(),
            date: toMonthInput(p.date),
            github_links: (p.github_links || []).map((l) => ({
              _id: uid(),
              name: l.name || "",
              url: l.url || "",
            })),
            bullet_points: (p.bullet_points || []).map((b) => ({
              _id: uid(),
              text: b.text || "",
            })),
          })),
        };
      }

      function toCandidate(state) {
        return {
          profile: state.profile,
          education: state.education.map(
            ({ _id, is_current, start_date, end_date, ...e }) => ({
              ...e,
              start_date: fromMonthInput(start_date),
              end_date: is_current ? "Present" : fromMonthInput(end_date),
            }),
          ),
          certificates: state.certificates.map(({ _id, date, ...c }) => ({
            ...c,
            date: fromMonthInput(date),
          })),
          skills: state.skills.map(({ _id, name, skills }) => ({
            name,
            skills: skills.map(({ _id, text }) => ({ text })),
          })),
          experiences: state.experiences.map(
            ({
              _id,
              is_current,
              start_date,
              end_date,
              bullet_points,
              ...e
            }) => ({
              ...e,
              start_date: fromMonthInput(start_date),
              end_date: is_current ? "Present" : fromMonthInput(end_date),
              bullet_points: bullet_points.map(({ _id, text }) => ({ text })),
            }),
          ),
          projects: state.projects.map(
            ({ _id, date, github_links, bullet_points, ...p }) => ({
              ...p,
              date: fromMonthInput(date),
              github_links: github_links.map(({ _id, ...l }) => l),
              bullet_points: bullet_points.map(({ _id, text }) => ({ text })),
            }),
          ),
        };
      }

      // ── Shared primitives ─────────────────────────────────────────────────────

      function Fg({ label, hint, children }) {
        return (
          <div className="form-group">
            {label && <label className="form-label">{label}</label>}
            {children}
            {hint && <span className="form-hint">{hint}</span>}
          </div>
        );
      }

      // Fix 5: EntryCard is now controlled — parent owns which entry is editing.
      // editingId / onEdit(id) / onDone() passed from section.
      function EntryCard({
        id,
        editingId,
        onEdit,
        onDone,
        viewContent,
        onDelete,
        children,
      }) {
        const isEditing = editingId === id;
        return (
          <div className="entry-card">
            {isEditing ? (
              <div>
                {children}
                <div className="entry-edit-footer">
                  <button className="btn btn-sm" onClick={onDelete}>
                    Remove
                  </button>
                  <button className="btn btn-sm btn-primary" onClick={onDone}>
                    Done
                  </button>
                </div>
              </div>
            ) : (
              <div className="entry-view">
                <div className="entry-view-info">{viewContent}</div>
                <div className="entry-view-actions">
                  <button className="btn btn-sm" onClick={() => onEdit(id)}>
                    Edit
                  </button>
                  <button
                    className="btn btn-sm btn-icon"
                    onClick={onDelete}
                    title="Remove"
                  >
                    ×
                  </button>
                </div>
              </div>
            )}
          </div>
        );
      }

      // Fix 4 (bullet ×): flex row — textarea takes flex:1, button stays inline
      function BulletList({ bullets, onAdd, onRemove, onUpdate }) {
        return (
          <Fg label="Bullet Points">
            <div className="bullet-list">
              {bullets.map((b, i) => (
                <div key={b._id} className="bullet-row">
                  <textarea
                    rows={2}
                    value={b.text}
                    onChange={(e) => onUpdate(b._id, e.target.value)}
                    placeholder={`Achievement or responsibility ${i + 1}...`}
                  />
                  <button
                    className="btn btn-sm btn-icon"
                    onClick={() => onRemove(b._id)}
                    title="Remove"
                  >
                    ×
                  </button>
                </div>
              ))}
              <button
                className="btn btn-sm"
                style={{ alignSelf: "flex-start" }}
                onClick={onAdd}
              >
                + Add Bullet
              </button>
            </div>
          </Fg>
        );
      }

      // Fix 3: Backspace-to-delete removed entirely. Only × removes chips.
      function ChipInput({ skills, onChange }) {
        const [input, setInput] = useState("");
        const addSkill = () => {
          const val = input.trim().replace(/,$/, "");
          if (!val) return;
          if (!skills.find((s) => s.text.toLowerCase() === val.toLowerCase())) {
            onChange([...skills, { _id: uid(), text: val }]);
          }
          setInput("");
        };
        return (
          <div
            className="chip-container"
            onClick={(e) =>
              e.currentTarget.querySelector(".chip-input")?.focus()
            }
          >
            {skills.map((sk) => (
              <span key={sk._id} className="skill-chip">
                {sk.text}
                <button
                  type="button"
                  className="chip-remove"
                  onClick={(e) => {
                    e.stopPropagation();
                    onChange(skills.filter((s) => s._id !== sk._id));
                  }}
                >
                  ×
                </button>
              </span>
            ))}
            <input
              className="chip-input"
              type="text"
              value={input}
              onChange={(e) => setInput(e.target.value)}
              onKeyDown={(e) => {
                if (e.key === "Enter" || e.key === ",") {
                  e.preventDefault();
                  addSkill();
                }
              }}
              onBlur={addSkill}
              placeholder={
                skills.length === 0 ? "Type a skill, press Enter to add..." : ""
              }
            />
          </div>
        );
      }

      function EndDateField({
        value,
        isCurrent,
        onDateChange,
        onCurrentChange,
        label = "End Date",
      }) {
        return (
          <Fg label={label}>
            <input
              type="month"
              value={value || ""}
              onChange={(e) => onDateChange(e.target.value)}
              disabled={isCurrent}
            />
            <label className="checkbox-label current-checkbox">
              <input
                type="checkbox"
                checked={isCurrent || false}
                onChange={(e) => onCurrentChange(e.target.checked)}
              />
              Present
            </label>
          </Fg>
        );
      }

      // Fix 2: Skill view — "CategoryName: skill1, skill2, skill3"
      function SkillViewRow({ name, skills }) {
        return (
          <div className="entry-view-skill-row">
            <span className="entry-view-title">
              {name || "Unnamed category"}
            </span>
            {skills.length > 0 && (
              <span className="entry-view-skill-list">
                : {skills.map((s) => s.text).join(", ")}
              </span>
            )}
          </div>
        );
      }

      // ── Tab sections ──────────────────────────────────────────────────────────

      function PersonalSection({ data, onChange }) {
        const set = (field) => (e) =>
          onChange({ ...data, [field]: e.target.value });
        return (
          <div>
            <p className="section-desc">
              Contact information rendered in your resume header.
            </p>
            <div className="card">
              <div className="card-body">
                <div className="form-row">
                  <Fg label="Full Name *">
                    <input
                      type="text"
                      value={data.name}
                      onChange={set("name")}
                      placeholder="Full Name"
                    />
                  </Fg>
                  <Fg label="Location">
                    <input
                      type="text"
                      value={data.location || ""}
                      onChange={set("location")}
                      placeholder="City, ST"
                    />
                  </Fg>
                </div>
                <div className="form-row">
                  <Fg label="Email">
                    <input
                      type="text"
                      value={data.email || ""}
                      onChange={set("email")}
                      placeholder="your@email.com"
                    />
                  </Fg>
                  <Fg label="Phone">
                    <input
                      type="text"
                      value={data.phone || ""}
                      onChange={set("phone")}
                      placeholder="+1 (555) 000-0000"
                    />
                  </Fg>
                </div>
                <div className="form-row">
                  <Fg label="LinkedIn URL">
                    <input
                      type="text"
                      value={data.linkedin_url || ""}
                      onChange={set("linkedin_url")}
                      placeholder="https://linkedin.com/in/handle"
                    />
                  </Fg>
                  <Fg
                    label="LinkedIn Label"
                    hint="Short display text shown on resume"
                  >
                    <input
                      type="text"
                      value={data.linkedin_label || ""}
                      onChange={set("linkedin_label")}
                      placeholder="linkedin.com/in/handle"
                    />
                  </Fg>
                </div>
              </div>
            </div>
          </div>
        );
      }

      function ProfileSection({ data, onChange }) {
        return (
          <div>
            <p className="section-desc">
              A concise professional summary at the top of your resume. The AI
              rewrites this for each role — write who you are and what you
              bring.
            </p>
            <div className="card">
              <div className="card-body">
                <Fg label="Profile Paragraph">
                  <textarea
                    rows={6}
                    value={data.profile}
                    onChange={(e) =>
                      onChange({ ...data, profile: e.target.value })
                    }
                    placeholder="Software engineer with X years of experience in..."
                  />
                </Fg>
              </div>
            </div>
          </div>
        );
      }

      function EducationSection({ data, onChange }) {
        const [editingId, setEditingId] = useState(null);

        const add = () => {
          const newId = uid();
          onChange({
            ...data,
            education: [
              ...data.education,
              {
                _id: newId,
                institution: "",
                start_date: "",
                end_date: "",
                is_current: false,
                degree_line: "",
                gpa: null,
                location: "",
              },
            ],
          });
          setEditingId(newId);
        };
        const remove = (id) => {
          onChange({
            ...data,
            education: data.education.filter((e) => e._id !== id),
          });
          if (editingId === id) setEditingId(null);
        };
        const update = (id, field, val) =>
          onChange({
            ...data,
            education: data.education.map((e) =>
              e._id === id ? { ...e, [field]: val } : e,
            ),
          });

        return (
          <div>
            <p className="section-desc">
              Universities, colleges, and other educational institutions.
            </p>
            {data.education.length === 0 && (
              <div className="empty-entries">No education entries yet.</div>
            )}
            {data.education.map((edu) => (
              <EntryCard
                key={edu._id}
                id={edu._id}
                editingId={editingId}
                onEdit={setEditingId}
                onDone={() => setEditingId(null)}
                onDelete={() => remove(edu._id)}
                viewContent={
                  <div>
                    <div className="entry-view-title">
                      {edu.institution || "Unnamed institution"}
                    </div>
                    <div className="entry-view-sub">
                      {edu.degree_line}
                      {edu.gpa ? ` | GPA: ${edu.gpa}` : ""}
                    </div>
                    <div className="entry-view-sub">
                      {displayRange(
                        edu.start_date,
                        edu.end_date,
                        edu.is_current,
                      )}
                      {edu.location ? ` · ${edu.location}` : ""}
                    </div>
                  </div>
                }
              >
                <div className="form-row">
                  <Fg label="Institution">
                    <input
                      type="text"
                      value={edu.institution}
                      onChange={(e) =>
                        update(edu._id, "institution", e.target.value)
                      }
                      placeholder="University Name"
                    />
                  </Fg>
                  <Fg label="Location">
                    <input
                      type="text"
                      value={edu.location}
                      onChange={(e) =>
                        update(edu._id, "location", e.target.value)
                      }
                      placeholder="City, ST"
                    />
                  </Fg>
                </div>
                <div className="form-row">
                  <Fg label="Start Date">
                    <input
                      type="month"
                      value={edu.start_date}
                      onChange={(e) =>
                        update(edu._id, "start_date", e.target.value)
                      }
                    />
                  </Fg>
                  <EndDateField
                    value={edu.end_date}
                    isCurrent={edu.is_current}
                    onDateChange={(v) => update(edu._id, "end_date", v)}
                    onCurrentChange={(v) => update(edu._id, "is_current", v)}
                  />
                </div>
                <div className="form-row">
                  <Fg label="Degree">
                    <input
                      type="text"
                      value={edu.degree_line}
                      onChange={(e) =>
                        update(edu._id, "degree_line", e.target.value)
                      }
                      placeholder="B.S. Computer Science"
                    />
                  </Fg>
                  <Fg label="GPA" hint="Optional">
                    <input
                      type="text"
                      value={edu.gpa || ""}
                      onChange={(e) =>
                        update(edu._id, "gpa", e.target.value || null)
                      }
                      placeholder="3.90"
                    />
                  </Fg>
                </div>
              </EntryCard>
            ))}
            <button className="btn btn-sm" onClick={add}>
              + Add Education
            </button>
          </div>
        );
      }

      function ExpSection({ data, onChange }) {
        const [editingId, setEditingId] = useState(null);

        const addExp = () => {
          const newId = uid();
          onChange({
            ...data,
            experiences: [
              ...data.experiences,
              {
                _id: newId,
                company_name: "",
                job_title: "",
                start_date: "",
                end_date: "",
                is_current: false,
                location: "",
                bullet_points: [],
              },
            ],
          });
          setEditingId(newId);
        };
        const removeExp = (id) => {
          onChange({
            ...data,
            experiences: data.experiences.filter((e) => e._id !== id),
          });
          if (editingId === id) setEditingId(null);
        };
        const updateExp = (id, field, val) =>
          onChange({
            ...data,
            experiences: data.experiences.map((e) =>
              e._id === id ? { ...e, [field]: val } : e,
            ),
          });
        const addBullet = (expId) =>
          onChange({
            ...data,
            experiences: data.experiences.map((e) =>
              e._id === expId
                ? {
                    ...e,
                    bullet_points: [
                      ...e.bullet_points,
                      { _id: uid(), text: "" },
                    ],
                  }
                : e,
            ),
          });
        const removeBullet = (expId, bId) =>
          onChange({
            ...data,
            experiences: data.experiences.map((e) =>
              e._id === expId
                ? {
                    ...e,
                    bullet_points: e.bullet_points.filter((b) => b._id !== bId),
                  }
                : e,
            ),
          });
        const updateBullet = (expId, bId, text) =>
          onChange({
            ...data,
            experiences: data.experiences.map((e) =>
              e._id === expId
                ? {
                    ...e,
                    bullet_points: e.bullet_points.map((b) =>
                      b._id === bId ? { ...b, text } : b,
                    ),
                  }
                : e,
            ),
          });

        return (
          <div>
            <p className="section-desc">
              Work experience, internships, and other professional roles.
            </p>
            {data.experiences.length === 0 && (
              <div className="empty-entries">No experience entries yet.</div>
            )}
            {data.experiences.map((exp) => (
              <EntryCard
                key={exp._id}
                id={exp._id}
                editingId={editingId}
                onEdit={setEditingId}
                onDone={() => setEditingId(null)}
                onDelete={() => removeExp(exp._id)}
                viewContent={
                  <div>
                    <div className="entry-view-title">
                      {exp.company_name || "Unnamed company"}
                      {exp.job_title ? ` — ${exp.job_title}` : ""}
                    </div>
                    <div className="entry-view-sub">
                      {displayRange(
                        exp.start_date,
                        exp.end_date,
                        exp.is_current,
                      )}
                      {exp.location ? ` · ${exp.location}` : ""}
                    </div>
                    {exp.bullet_points.length > 0 && (
                      <div className="entry-view-sub">
                        {exp.bullet_points.length} bullet
                        {exp.bullet_points.length !== 1 ? "s" : ""}
                      </div>
                    )}
                  </div>
                }
              >
                <div className="form-row">
                  <Fg label="Company">
                    <input
                      type="text"
                      value={exp.company_name}
                      onChange={(e) =>
                        updateExp(exp._id, "company_name", e.target.value)
                      }
                      placeholder="Company Name"
                    />
                  </Fg>
                  <Fg label="Job Title">
                    <input
                      type="text"
                      value={exp.job_title}
                      onChange={(e) =>
                        updateExp(exp._id, "job_title", e.target.value)
                      }
                      placeholder="Software Engineer"
                    />
                  </Fg>
                </div>
                <div className="form-row">
                  <Fg label="Start Date">
                    <input
                      type="month"
                      value={exp.start_date}
                      onChange={(e) =>
                        updateExp(exp._id, "start_date", e.target.value)
                      }
                    />
                  </Fg>
                  <EndDateField
                    value={exp.end_date}
                    isCurrent={exp.is_current}
                    onDateChange={(v) => updateExp(exp._id, "end_date", v)}
                    onCurrentChange={(v) => updateExp(exp._id, "is_current", v)}
                  />
                </div>
                <Fg label="Location">
                  <input
                    type="text"
                    value={exp.location}
                    onChange={(e) =>
                      updateExp(exp._id, "location", e.target.value)
                    }
                    placeholder="City, ST or Remote"
                  />
                </Fg>
                <BulletList
                  bullets={exp.bullet_points}
                  onAdd={() => addBullet(exp._id)}
                  onRemove={(bId) => removeBullet(exp._id, bId)}
                  onUpdate={(bId, text) => updateBullet(exp._id, bId, text)}
                />
              </EntryCard>
            ))}
            <button className="btn btn-sm" onClick={addExp}>
              + Add Experience
            </button>
          </div>
        );
      }

      function ProjectsSection({ data, onChange }) {
        const [editingId, setEditingId] = useState(null);

        const addProject = () => {
          const newId = uid();
          onChange({
            ...data,
            projects: [
              ...data.projects,
              {
                _id: newId,
                name: "",
                date: "",
                github_links: [],
                bullet_points: [],
              },
            ],
          });
          setEditingId(newId);
        };
        const removeProject = (id) => {
          onChange({
            ...data,
            projects: data.projects.filter((p) => p._id !== id),
          });
          if (editingId === id) setEditingId(null);
        };
        const updateProject = (id, field, val) =>
          onChange({
            ...data,
            projects: data.projects.map((p) =>
              p._id === id ? { ...p, [field]: val } : p,
            ),
          });
        const addLink = (projId) =>
          onChange({
            ...data,
            projects: data.projects.map((p) =>
              p._id === projId
                ? {
                    ...p,
                    github_links: [
                      ...p.github_links,
                      { _id: uid(), name: "", url: "" },
                    ],
                  }
                : p,
            ),
          });
        const removeLink = (projId, lid) =>
          onChange({
            ...data,
            projects: data.projects.map((p) =>
              p._id === projId
                ? {
                    ...p,
                    github_links: p.github_links.filter((l) => l._id !== lid),
                  }
                : p,
            ),
          });
        const updateLink = (projId, lid, field, val) =>
          onChange({
            ...data,
            projects: data.projects.map((p) =>
              p._id === projId
                ? {
                    ...p,
                    github_links: p.github_links.map((l) =>
                      l._id === lid ? { ...l, [field]: val } : l,
                    ),
                  }
                : p,
            ),
          });
        const addBullet = (projId) =>
          onChange({
            ...data,
            projects: data.projects.map((p) =>
              p._id === projId
                ? {
                    ...p,
                    bullet_points: [
                      ...p.bullet_points,
                      { _id: uid(), text: "" },
                    ],
                  }
                : p,
            ),
          });
        const removeBullet = (projId, bId) =>
          onChange({
            ...data,
            projects: data.projects.map((p) =>
              p._id === projId
                ? {
                    ...p,
                    bullet_points: p.bullet_points.filter((b) => b._id !== bId),
                  }
                : p,
            ),
          });
        const updateBullet = (projId, bId, text) =>
          onChange({
            ...data,
            projects: data.projects.map((p) =>
              p._id === projId
                ? {
                    ...p,
                    bullet_points: p.bullet_points.map((b) =>
                      b._id === bId ? { ...b, text } : b,
                    ),
                  }
                : p,
            ),
          });

        return (
          <div>
            <p className="section-desc">Personal and academic projects.</p>
            {data.projects.length === 0 && (
              <div className="empty-entries">No projects yet.</div>
            )}
            {data.projects.map((proj) => (
              <EntryCard
                key={proj._id}
                id={proj._id}
                editingId={editingId}
                onEdit={setEditingId}
                onDone={() => setEditingId(null)}
                onDelete={() => removeProject(proj._id)}
                viewContent={
                  <div>
                    <div className="entry-view-title">
                      {proj.name || "Unnamed project"}
                    </div>
                    <div className="entry-view-sub">
                      {proj.date ? fromMonthInput(proj.date) : ""}
                      {proj.bullet_points.length > 0
                        ? ` · ${proj.bullet_points.length} bullet${proj.bullet_points.length !== 1 ? "s" : ""}`
                        : ""}
                    </div>
                  </div>
                }
              >
                <div className="form-row">
                  <Fg label="Project Name">
                    <input
                      type="text"
                      value={proj.name}
                      onChange={(e) =>
                        updateProject(proj._id, "name", e.target.value)
                      }
                      placeholder="Project Name"
                    />
                  </Fg>
                  <Fg label="Date">
                    <input
                      type="month"
                      value={proj.date}
                      onChange={(e) =>
                        updateProject(proj._id, "date", e.target.value)
                      }
                    />
                  </Fg>
                </div>
                <Fg
                  label="GitHub Links"
                  hint="Optional — label and URL for each repository"
                >
                  <div className="repo-rows">
                    {proj.github_links.map((link) => (
                      <div key={link._id} className="repo-row">
                        <input
                          type="text"
                          value={link.name}
                          onChange={(e) =>
                            updateLink(
                              proj._id,
                              link._id,
                              "name",
                              e.target.value,
                            )
                          }
                          placeholder="Label (e.g. GitHub)"
                        />
                        <input
                          type="text"
                          value={link.url}
                          onChange={(e) =>
                            updateLink(
                              proj._id,
                              link._id,
                              "url",
                              e.target.value,
                            )
                          }
                          placeholder="https://github.com/..."
                        />
                        <button
                          className="btn btn-sm btn-icon"
                          onClick={() => removeLink(proj._id, link._id)}
                        >
                          ×
                        </button>
                      </div>
                    ))}
                    <button
                      className="btn btn-sm"
                      onClick={() => addLink(proj._id)}
                    >
                      + Add Link
                    </button>
                  </div>
                </Fg>
                <BulletList
                  bullets={proj.bullet_points}
                  onAdd={() => addBullet(proj._id)}
                  onRemove={(bId) => removeBullet(proj._id, bId)}
                  onUpdate={(bId, text) => updateBullet(proj._id, bId, text)}
                />
              </EntryCard>
            ))}
            <button className="btn btn-sm" onClick={addProject}>
              + Add Project
            </button>
          </div>
        );
      }

      function SkillsSection({ data, onChange }) {
        const [editingId, setEditingId] = useState(null);

        const addCat = () => {
          const newId = uid();
          onChange({
            ...data,
            skills: [...data.skills, { _id: newId, name: "", skills: [] }],
          });
          setEditingId(newId);
        };
        const removeCat = (id) => {
          onChange({
            ...data,
            skills: data.skills.filter((s) => s._id !== id),
          });
          if (editingId === id) setEditingId(null);
        };
        const updateName = (id, name) =>
          onChange({
            ...data,
            skills: data.skills.map((s) => (s._id === id ? { ...s, name } : s)),
          });
        const updateSkills = (catId, skills) =>
          onChange({
            ...data,
            skills: data.skills.map((s) =>
              s._id === catId ? { ...s, skills } : s,
            ),
          });

        return (
          <div>
            <p className="section-desc">
              Organize skills into categories — each becomes a row on your
              resume. Type a skill and press Enter or comma to add it.
            </p>
            {data.skills.length === 0 && (
              <div className="empty-entries">No skill categories yet.</div>
            )}
            {data.skills.map((cat) => (
              <EntryCard
                key={cat._id}
                id={cat._id}
                editingId={editingId}
                onEdit={setEditingId}
                onDone={() => setEditingId(null)}
                onDelete={() => removeCat(cat._id)}
                viewContent={
                  <SkillViewRow name={cat.name} skills={cat.skills} />
                }
              >
                <Fg label="Category Name">
                  <input
                    type="text"
                    value={cat.name}
                    onChange={(e) => updateName(cat._id, e.target.value)}
                    placeholder="Languages"
                  />
                </Fg>
                <Fg
                  label="Skills"
                  hint="Type a skill and press Enter or comma to add"
                >
                  <ChipInput
                    skills={cat.skills}
                    onChange={(skills) => updateSkills(cat._id, skills)}
                  />
                </Fg>
              </EntryCard>
            ))}
            <button className="btn btn-sm" onClick={addCat}>
              + Add Category
            </button>
          </div>
        );
      }

      function CertSection({ data, onChange }) {
        const [editingId, setEditingId] = useState(null);

        const add = () => {
          const newId = uid();
          onChange({
            ...data,
            certificates: [
              ...data.certificates,
              { _id: newId, name: "", issuer: "", date: "" },
            ],
          });
          setEditingId(newId);
        };
        const remove = (id) => {
          onChange({
            ...data,
            certificates: data.certificates.filter((c) => c._id !== id),
          });
          if (editingId === id) setEditingId(null);
        };
        const update = (id, field, val) =>
          onChange({
            ...data,
            certificates: data.certificates.map((c) =>
              c._id === id ? { ...c, [field]: val } : c,
            ),
          });

        return (
          <div>
            <p className="section-desc">
              Professional certifications and licenses.
            </p>
            {data.certificates.length === 0 && (
              <div className="empty-entries">No certificates yet.</div>
            )}
            {data.certificates.map((cert) => (
              <EntryCard
                key={cert._id}
                id={cert._id}
                editingId={editingId}
                onEdit={setEditingId}
                onDone={() => setEditingId(null)}
                onDelete={() => remove(cert._id)}
                viewContent={
                  <div>
                    <div className="entry-view-title">
                      {cert.name || "Unnamed certificate"}
                    </div>
                    <div className="entry-view-sub">
                      {[cert.issuer, cert.date ? fromMonthInput(cert.date) : ""]
                        .filter(Boolean)
                        .join(" · ")}
                    </div>
                  </div>
                }
              >
                <div className="form-row">
                  <Fg label="Certificate Name">
                    <input
                      type="text"
                      value={cert.name}
                      onChange={(e) => update(cert._id, "name", e.target.value)}
                      placeholder="Certification Name"
                    />
                  </Fg>
                  <Fg label="Issuer">
                    <input
                      type="text"
                      value={cert.issuer || ""}
                      onChange={(e) =>
                        update(cert._id, "issuer", e.target.value)
                      }
                      placeholder="Issuing Organization"
                    />
                  </Fg>
                </div>
                <Fg label="Date Earned">
                  <input
                    type="month"
                    value={cert.date || ""}
                    onChange={(e) => update(cert._id, "date", e.target.value)}
                  />
                </Fg>
              </EntryCard>
            ))}
            <button className="btn btn-sm" onClick={add}>
              + Add Certificate
            </button>
          </div>
        );
      }

      function SummarySection({ data, onChange }) {
        const [editingId, setEditingId] = useState(null);

        const add = () => {
          const newId = uid();
          onChange({
            topics: [...data.topics, { _id: newId, topic: "", response: "" }],
          });
          setEditingId(newId);
        };
        const remove = (id) => {
          onChange({ topics: data.topics.filter((t) => t._id !== id) });
          if (editingId === id) setEditingId(null);
        };
        const update = (id, field, val) =>
          onChange({
            topics: data.topics.map((t) =>
              t._id === id ? { ...t, [field]: val } : t,
            ),
          });

        return (
          <div>
            <p className="section-desc">
              Narrative context used when answering open-ended application
              questions. Write in first person, honest and specific — the AI
              answers in your voice. Suggested topics: origin, career direction,
              why this field, strengths, problem solving, weaknesses.
            </p>
            {data.topics.length === 0 && (
              <div className="empty-entries">No topics yet.</div>
            )}
            {data.topics.map((t) => (
              <EntryCard
                key={t._id}
                id={t._id}
                editingId={editingId}
                onEdit={setEditingId}
                onDone={() => setEditingId(null)}
                onDelete={() => remove(t._id)}
                viewContent={
                  <div>
                    <div className="entry-view-title">
                      {t.topic || "Unnamed topic"}
                    </div>
                    {t.response && (
                      <div className="entry-view-sub">
                        {t.response.slice(0, 120)}
                        {t.response.length > 120 ? "…" : ""}
                      </div>
                    )}
                  </div>
                }
              >
                <Fg label="Topic">
                  <input
                    type="text"
                    value={t.topic}
                    onChange={(e) => update(t._id, "topic", e.target.value)}
                    placeholder="e.g. career_direction"
                  />
                </Fg>
                <Fg label="Your Response">
                  <textarea
                    rows={5}
                    value={t.response}
                    onChange={(e) => update(t._id, "response", e.target.value)}
                    placeholder="Write in first person, honest and specific..."
                  />
                </Fg>
              </EntryCard>
            ))}
            <button className="btn btn-sm" onClick={add}>
              + Add Topic
            </button>
          </div>
        );
      }

      // ── Tab config ────────────────────────────────────────────────────────────
      const TAB_ORDER = [
        "personal",
        "profile",
        "education",
        "experience",
        "projects",
        "skills",
        "certificates",
        "summary",
      ];
      const TAB_LABELS = {
        personal: "Personal",
        profile: "Profile",
        education: "Education",
        experience: "Experience",
        projects: "Projects",
        skills: "Skills",
        certificates: "Certificates",
        summary: "Q&A",
      };

      // ── Main App ──────────────────────────────────────────────────────────────
      const BLANK_PERSONAL = {
        name: "",
        location: "",
        phone: "",
        email: "",
        linkedin_url: "",
        linkedin_label: "",
      };
      const BLANK_CANDIDATE = {
        profile: "",
        education: [],
        certificates: [],
        skills: [],
        experiences: [],
        projects: [],
      };
      const BLANK_SUMMARY = { topics: [] };

      function App() {
        const [tab, setTab] = useState("personal");
        const [personal, setPersonal] = useState(BLANK_PERSONAL);
        const [candidate, setCandidate] = useState(BLANK_CANDIDATE);
        const [summary, setSummary] = useState(BLANK_SUMMARY);
        const [loading, setLoading] = useState(true);
        const [saving, setSaving] = useState(false);

        const snap = useRef({ personal, candidate, summary, tab });
        useEffect(() => {
          snap.current = { personal, candidate, summary, tab };
        }, [personal, candidate, summary, tab]);
        useEffect(() => {
          init();
        }, []);

        async function init() {
          await requireAuth();
          document.body.style.display = "";
          try {
            const data = await apiFetch("GET", "/api/v1/profile");
            if (data?.personal)
              setPersonal({ ...BLANK_PERSONAL, ...data.personal });
            if (data?.candidate) setCandidate(fromCandidate(data.candidate));
            if (data?.personal_summary) {
              const raw = data.personal_summary;
              setSummary({
                topics: (raw.topics || []).map((t) => ({ ...t, _id: uid() })),
              });
            }
          } catch (e) {
            if (!e.message.includes("404"))
              toast("Could not load profile: " + e.message, "error");
          }
          setLoading(false);
        }

        async function save() {
          if (saving) return;
          const {
            personal: p,
            candidate: c,
            summary: s,
            tab: t,
          } = snap.current;
          setSaving(true);
          try {
            if (t === "personal") {
              await apiFetch("PUT", "/api/v1/profile/personal", p);
            } else if (t === "summary") {
              await apiFetch("PUT", "/api/v1/profile/personal-summary", {
                topics: s.topics.map(({ _id, ...rest }) => rest),
              });
            } else {
              await apiFetch(
                "PUT",
                "/api/v1/profile/candidate",
                toCandidate(c),
              );
            }
            toast("Saved", "success");
          } catch (e) {
            toast("Save failed: " + e.message, "error");
          } finally {
            setSaving(false);
          }
        }

        function switchTab(newTab) {
          save().catch(console.error);
          setTab(newTab);
        }

        async function goNext() {
          await save();
          const idx = TAB_ORDER.indexOf(tab);
          if (idx < TAB_ORDER.length - 1) setTab(TAB_ORDER[idx + 1]);
          else window.location.href = "/";
        }

        async function goPrev() {
          await save();
          const idx = TAB_ORDER.indexOf(tab);
          if (idx > 0) setTab(TAB_ORDER[idx - 1]);
        }

        function badge(t) {
          const counts = {
            education: candidate.education.length,
            certificates: candidate.certificates.length,
            skills: candidate.skills.length,
            experience: candidate.experiences.length,
            projects: candidate.projects.length,
            summary: summary.topics.length,
          };
          const n = counts[t];
          return n ? <span className="tab-badge">{n}</span> : null;
        }

        function renderSection() {
          switch (tab) {
            case "personal":
              return <PersonalSection data={personal} onChange={setPersonal} />;
            case "profile":
              return (
                <ProfileSection data={candidate} onChange={setCandidate} />
              );
            case "education":
              return (
                <EducationSection data={candidate} onChange={setCandidate} />
              );
            case "experience":
              return <ExpSection data={candidate} onChange={setCandidate} />;
            case "projects":
              return (
                <ProjectsSection data={candidate} onChange={setCandidate} />
              );
            case "skills":
              return <SkillsSection data={candidate} onChange={setCandidate} />;
            case "certificates":
              return <CertSection data={candidate} onChange={setCandidate} />;
            case "summary":
              return <SummarySection data={summary} onChange={setSummary} />;
          }
        }

        const tabIdx = TAB_ORDER.indexOf(tab);
        const isFirst = tabIdx === 0;
        const isLast = tabIdx === TAB_ORDER.length - 1;

        return (
          <>
            <header>
              <span className="header-title">job-application-assistant</span>
              <div style={{ display: "flex", gap: "8px" }}>
                <a className="btn btn-sm" href="/">
                  ← Back to App
                </a>
                <button className="btn btn-sm" onClick={() => signOut()}>
                  Sign Out
                </button>
              </div>
            </header>

            <div className="tab-bar">
              {TAB_ORDER.map((t) => (
                <button
                  key={t}
                  className={"tab" + (tab === t ? " active" : "")}
                  onClick={() => switchTab(t)}
                  disabled={saving}
                >
                  {TAB_LABELS[t]}
                  {badge(t)}
                </button>
              ))}
            </div>

            <main className="profile-main">
              <div className="profile-nav-bar">
                {!isFirst && (
                  <button
                    className="btn btn-sm"
                    onClick={goPrev}
                    disabled={saving || loading}
                  >
                    ← Prev
                  </button>
                )}
                <button
                  className="btn btn-sm"
                  onClick={save}
                  disabled={saving || loading}
                >
                  {saving ? "Saving..." : "Save"}
                </button>
                <button
                  className="btn btn-sm btn-primary"
                  onClick={goNext}
                  disabled={saving || loading}
                >
                  {isLast ? "Finish" : "Next →"}
                </button>
              </div>

              {loading ? (
                <div className="empty-state">Loading profile...</div>
              ) : (
                renderSection()
              )}
            </main>
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById("app")).render(<App />);
    </script>
  </body>
</html>
