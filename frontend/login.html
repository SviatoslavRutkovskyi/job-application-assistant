<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Application Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/frontend/style.css" />
    <style>
      .login-container {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 32px;
        padding: 24px;
      }
      .login-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-md);
        padding: 48px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
        max-width: 400px;
        width: 100%;
        text-align: center;
      }
      .login-title {
        font-family: var(--mono);
        font-size: 15px;
        font-weight: 500;
        letter-spacing: 0.04em;
        color: var(--text);
      }
      .login-subtitle {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--text-3);
        line-height: 1.7;
      }
      .btn-login {
        width: 100%;
        justify-content: center;
        padding: 10px 24px;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="login-card">
        <span class="login-title">job-application-assistant</span>
        <span class="login-subtitle">
          Sign in to generate cover letters,<br />
          tailor resumes, and answer application questions.
        </span>
        <a
          class="btn btn-primary btn-login"
          href="/.auth/login/oidc?post_login_redirect_uri=/"
        >
          Sign In / Register
        </a>
      </div>
    </div>
  </body>
</html>
